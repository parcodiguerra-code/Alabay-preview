  /* ── pedigree table builder (3 gen) ── */
  function buildPedTable(S){
    if(!S) return '';
    var GENS=4;
    var ROWS=8;
    var TABLE=[];
    for(var g=0;g<GENS;g++) TABLE.push(new Array(Math.pow(2,g)).fill(null));
    TABLE[0][0]=S;
    function fill(id,gen,slot){
      if(gen>=GENS) return;
      var r=id?INDEX.get(String(id)):null;
      TABLE[gen][slot]=r||null;
      if(r){fill(r.padre,gen+1,slot*2); fill(r.madre,gen+1,slot*2+1);}
    }
    fill(S.id,0,0);
    function sexC(r){if(!r)return'#bbb';var s=String(r.sesso||'').toUpperCase();return s==='M'?'#1d4ed8':s==='F'?'#9d174d':'#555';}
    function sexBg(r){if(!r)return'#fafafa';var s=String(r.sesso||'').toUpperCase();return s==='M'?'#eff6ff':s==='F'?'#fdf2f8':'#f9fafb';}

      if(coiFv!=null&&isFinite(coiFv)){var cp=coiFv*100;var cc=cp<5?'#0d9488':cp<10?'#d97706':cp<20?'#ea580c':'#dc2626';coiS='<span style="font-size:7.5px;color:'+cc+';font-weight:700;margin-left:3px">F:'+cp.toFixed(1)+'%</span>';}
      return '<div style="background:'+sexBg(r)+';border-left:2.5px solid '+sexC(r)+';border-radius:3px;padding:3px 5px;height:100%;display:flex;flex-direction:column;justify-content:center;gap:1px">'+
        '<div style="font-size:9.5px;font-weight:700;font-family:\'Playfair Display\',Georgia,serif;line-height:1.1;color:#111827">'+(r.name||r.id)+coiS+'</div>'+
        '<div style="font-size:7.5px;color:#6b7280">'+[r.birth?r.birth.slice(0,4):'',r.paese,''].filter(Boolean).join(' · ')+'</div>'+

        tbody+='<td style="padding:1px 2px" rowspan="'+(ROWS/4)+'">'+cell(TABLE[2][0])+'</td>';
        tbody+='<td style="padding:1px 2px">'+cell(TABLE[3][0])+'</td>';

        tbody+='<td style="padding:1px 2px">'+cell(TABLE[3][1])+'</td>';
      } else if(row===2){
        tbody+='<td style="padding:1px 2px" rowspan="'+(ROWS/4)+'">'+cell(TABLE[2][1])+'</td>';
        tbody+='<td style="padding:1px 2px">'+cell(TABLE[3][2])+'</td>';
      } else if(row===3){
        tbody+='<td style="padding:1px 2px">'+cell(TABLE[3][3])+'</td>';

        tbody+='<td style="padding:1px 2px" rowspan="'+(ROWS/2)+'">'+cell(TABLE[1][1])+'</td>';
        tbody+='<td style="padding:1px 2px" rowspan="'+(ROWS/4)+'">'+cell(TABLE[2][2])+'</td>';
        tbody+='<td style="padding:1px 2px">'+cell(TABLE[3][4])+'</td>';

  /* ── GLOBAL COI TREND (all DB by tipo) ── */
  var TIPO_NORM_M={'PUREBRED TURKMAN ALABAY':'PUREBRED TURKMEN ALABAY','PUREBRDE TURKMEN ALABAY':'PUREBRED TURKMEN ALABAY','PUREBRED TURKMEN ALABY':'PUREBRED TURKMEN ALABAY','PUREBRED TURKMEN VOLKODAV':'PUREBRED TURKMEN ALABAY','CENTARL ASIAN VOLKODAV':'CENTRAL ASIAN VOLKODAV','CENBTRAL ASIAN VOLKODAV':'CENTRAL ASIAN VOLKODAV','CENTRALA SIAN VOLKODAV':'CENTRAL ASIAN VOLKODAV','CENTRAL ASIAN VOLKODAW':'CENTRAL ASIAN VOLKODAV','PUREBRED UZBEK SARKANDJIK':'PUREBRED UZBEK SARKANJIK'};
  function normT(t){var u=(t||'').trim().toUpperCase();return TIPO_NORM_M[u]||u||'';}
  var TIPO_PRIMARY_PR=['PUREBRED TURKMEN ALABAY','TURKMEN ALABAY','CENTRAL ASIAN VOLKODAV','PUREBRED CENTRAL ASIAN SHEPHERD DOG'];
  var globalByTipoYear=new Map();

    var Fv=F_of(r.id); if(Fv==null||!isFinite(Fv)||isNaN(Fv)) return;
    globalYears.add(yr);
    if(!globalByTipoYear.has(tipo)) globalByTipoYear.set(tipo,new Map());
    var ym=globalByTipoYear.get(tipo);
    if(!ym.has(yr)) ym.set(yr,{sum:0,n:0});
    var o=ym.get(yr); o.sum+=Fv*100; o.n++;
  });
  var gYears=Array.from(globalYears).sort();

  function svgMultiLine(tipos,yrsArr,W,H){
    if(!yrsArr||yrsArr.length<2) return '<div style="font-size:11px;color:#9ca3af;font-style:italic;padding:20px 0">Dati insufficienti</div>';
    var TCOLORS={'PUREBRED TURKMEN ALABAY':'#3b82f6','TURKMEN ALABAY':'#60a5fa','CENTRAL ASIAN VOLKODAV':'#ec4899','PUREBRED CENTRAL ASIAN SHEPHERD DOG':'#10b981'};
    var PAD={top:12,right:8,bottom:28,left:38};

    maxV=Math.ceil(maxV/5)*5||20;
    function xS(i){return PAD.left+cW*i/(yrsArr.length-1);}
    function yS(v){return PAD.top+cH-cH*v/maxV;}
    var s='<svg xmlns="http://www.w3.org/2000/svg" width="'+W+'" height="'+H+'" style="display:block">';
    for(var i=0;i<=4;i++){var yv=maxV*i/4,y=yS(yv);s+='<line x1="'+PAD.left+'" x2="'+(PAD.left+cW)+'" y1="'+y.toFixed(1)+'" y2="'+y.toFixed(1)+'" stroke="#e5e7eb" stroke-width="0.8" stroke-dasharray="3 3"/>';s+='<text x="'+(PAD.left-4)+'" y="'+(y+3.5).toFixed(1)+'" text-anchor="end" font-size="8" fill="#9ca3af">'+yv.toFixed(1)+'%</text>';}
    var step=yrsArr.length>12?3:yrsArr.length>6?2:1;
    for(var i=0;i<yrsArr.length;i++){if(i%step!==0&&i!==yrsArr.length-1)continue;s+='<text x="'+xS(i).toFixed(1)+'" y="'+(PAD.top+cH+16).toFixed(1)+'" text-anchor="middle" font-size="8" fill="#6b7280">'+yrsArr[i]+'</text>';}
    tipos.forEach(function(tipo){
      var ym=globalByTipoYear.get(tipo); if(!ym) return;
      var pts=yrsArr.map(function(yr,i){var o=ym.get(yr);return {i:i,v:(o&&o.n>=2)?o.sum/o.n:null};}).filter(function(p){return p.v!=null;});
      if(pts.length<2) return;
      var col=TCOLORS[tipo]||'#94a3b8';

function printPedigree(){
  if(!SUBJECT){ setStatus('Seleziona un soggetto.','warn'); return; }

  /* ── Gather data ── */
  var S=SUBJECT;
  var fotos=photosOf(S);
  var F=F_of(S.id);
  var coiPct=(F!=null&&isFinite(F))?(F*100):null;
  var coiLabel=coiPct!=null?coiLabelFromPct(coiPct):'';
  var coiColor=coiPct==null?'#555':coiPct<5?'#0d9488':coiPct<10?'#d97706':coiPct<20?'#ea580c':'#dc2626';
  var coiBg  =coiPct==null?'#f5f5f5':coiPct<5?'#f0fdfa':coiPct<10?'#fffbeb':coiPct<20?'#fff7ed':'#fef2f2';

  /* ── Build pedigree table (4 generations = subject+3) ── */
  /* returns array[gen][slot] of rec or null */
  function getAnc(id,gen,maxGen){
    if(gen>maxGen) return [];
    var r=id?INDEX.get(String(id)):null;
    var node={rec:r,id:id||'',gen:gen};
    if(!r||gen===maxGen) return [node];
    return [node]
      .concat(getAnc(r.padre,gen+1,maxGen))
      .concat(getAnc(r.madre,gen+1,maxGen));
  }

  /* Build a 4-gen table: subject(col0), parents(col1), grandparents(col2), great-grandparents(col3) */
  /* Classic pedigree: each generation doubles the rows. 4 gens = 1+2+4+8 = 15 slots, 8 rows */
  var GENS=4; /* including subject */
  var ROWS=Math.pow(2,GENS-1); /* 8 rows */

  /* Slot addressing: gen 0 = slot 0 (subject), gen k has 2^k slots */
  function buildSlots(id, gen, slotStart){
    /* slotStart in 0-based units of (ROWS / 2^gen) */
    var r=id?INDEX.get(String(id||'')):null;
    var result=[];
    result.push({gen:gen,slot:slotStart,rec:r,id:id||''});
    if(gen<GENS-1){
      var childSlots=ROWS/Math.pow(2,gen);       /* how many final-row slots this node spans */
      var halfSpan =childSlots/2;
      var sireStart=slotStart*2;
      var damStart =slotStart*2+1;
      if(r&&r.padre) result=result.concat(buildSlots(r.padre,gen+1,sireStart));
      else           result.push({gen:gen+1,slot:sireStart,rec:null,id:''});
      if(r&&r.madre) result=result.concat(buildSlots(r.madre,gen+1,damStart));
      else           result.push({gen:gen+1,slot:damStart,rec:null,id:''});
      /* recurse deeper even for unknowns */
      if(gen+1<GENS-1){
        var nextSlots=result.filter(function(n){return n.gen===gen+1&&!n.rec;});
        /* already pushed nulls above, need to fill gen+2 nulls too */
      }
    }
    return result;
  }

  /* Simpler: flat array indexed [gen][slot] */
  var TABLE=[]; /* TABLE[gen] = array of records (or null), length = 2^gen */
  for(var g=0;g<GENS;g++) TABLE.push(new Array(Math.pow(2,g)).fill(null));
  TABLE[0][0]=S;
  function fillTable(id,gen,slot){
    if(gen>=GENS) return;
    var r=id?INDEX.get(String(id||'')):null;
    TABLE[gen][slot]=r||null;
    if(r){
      fillTable(r.padre,gen+1,slot*2);
      fillTable(r.madre,gen+1,slot*2+1);
    }
  }
  fillTable(S.id,0,0);

  /* ── Cell renderer ── */
  function sexColor(rec){
    if(!rec) return '#bbb';
    var sx=String(rec.sesso||'').toUpperCase();
    return sx==='M'?'#1d4ed8':sx==='F'?'#9d174d':'#555';
  }
  function sexBg(rec){
    if(!rec) return '#fafafa';
    var sx=String(rec.sesso||'').toUpperCase();
    return sx==='M'?'#eff6ff':sx==='F'?'#fdf2f8':'#f9fafb';
  }
  function fmtMeta(rec){
    var parts=[];
    if(rec.birth) parts.push(rec.birth);
    if(rec.paese) parts.push(rec.paese);
    if(rec.pedigree) parts.push(rec.pedigree);
    return parts.join(' · ');
  }
  function cellHTML(rec,gen){
    if(!rec){
      return '<div class="cell cell-unk"><span class="cell-unk-lbl">Sconosciuto</span></div>';
    }
    var sx=String(rec.sesso||'').toUpperCase();
    var sxLabel=sx==='M'?'M':sx==='F'?'F':'?';
    var Fv=F_of(rec.id);
    var coiStr=(Fv!=null&&isFinite(Fv))?(Fv*100).toFixed(1)+'%':'';
    var coiC=Fv==null?'':Fv*100<5?'#0d9488':Fv*100<10?'#d97706':Fv*100<20?'#ea580c':'#dc2626';
    return '<div class="cell" style="background:'+sexBg(rec)+';border-left:3px solid '+sexColor(rec)+'">'+
      '<div class="cell-top">'+
        '<span class="sex-badge" style="background:'+sexColor(rec)+'">'+sxLabel+'</span>'+
        '<span class="cell-name">'+(clean(rec.name)||'—')+'</span>'+
      '</div>'+
      (fmtMeta(rec)?'<div class="cell-meta">'+fmtMeta(rec)+'</div>':'')+
      (rec.allevatore?'<div class="cell-meta" style="color:#555">All. '+clean(rec.allevatore)+'</div>':'')+
      (coiStr?'<div class="cell-coi" style="color:'+coiC+'">COI '+coiStr+'</div>':'')+
    '</div>';
  }

  /* ── COI common ancestors for footer ── */
  var contribs=computeCoiContribs(S.id,10);
  var ancRows='';
  if(contribs&&contribs.items&&contribs.items.length){
    var top=contribs.items.slice(0,6);
    for(var i=0;i<top.length;i++){
      var it=top[i];
      var barW=Math.max(2,Math.min(100,it.pct));
      var barC=it.pct<5?'#0d9488':it.pct<10?'#d97706':'#ea580c';
      ancRows+='<tr>'+
        '<td class="anc-name">'+(i+1)+'. '+clean(it.name||it.id)+'</td>'+
        '<td class="anc-pct" style="color:'+barC+'">'+it.pct.toFixed(2)+'%</td>'+
        '<td class="anc-bar-cell"><div class="anc-bar"><div class="anc-fill" style="width:'+barW.toFixed(1)+'%;background:'+barC+'"></div></div></td>'+
      '</tr>';
    }
  }

  /* ── Photo (base64 inline, first only) ── */
  var photoHTML='';
  if(fotos.length){
    photoHTML='<img src="'+fotos[0]+'" class="subject-photo" alt="Foto '+clean(S.name||'')+'">';
  }

  /* ── Pedigree grid HTML ── */
  /* Columns: subject | parents | grandparents | great-grandparents */
  /* Each cell in gen g spans ROWS/2^g rows */
  var gridCols='<colgroup>'+
    '<col style="width:22%">'+  /* subject */
    '<col style="width:20%">'+  /* parents */
    '<col style="width:22%">'+  /* grandparents */
    '<col style="width:36%">'+  /* great-grandparents */
    '</colgroup>';

  /* Build table rows: ROWS=8 rows */
  /* For each row, determine which cell from each generation belongs there */
  var tableRows='';
  for(var row=0;row<ROWS;row++){
    tableRows+='<tr>';
    for(var gen=0;gen<GENS;gen++){
      var span=ROWS/Math.pow(2,gen);
      var slot=Math.floor(row/span);
      if(row % span === 0){
        /* first row of this cell's span */
        var rec=TABLE[gen][slot]||null;
        tableRows+='<td rowspan="'+span+'" class="pedigree-cell gen'+gen+'">'+cellHTML(rec,gen)+'</td>';
      }
      /* else: spanned, skip */
    }
    tableRows+='</tr>';
  }

  /* ── today's date ── */
  var today=new Date();
  var dateStr=today.getDate()+'/'+(today.getMonth()+1)+'/'+today.getFullYear();

  /* ── FULL HTML ── */
  var html='<!doctype html><html lang="it"><head>'+
  '<meta charset="utf-8">'+
  '<title>Pedigree – '+clean(S.name||S.id)+'</title>'+
  '<link rel="preconnect" href="https://fonts.googleapis.com">'+

/* ===========================
COI - TABULAR METHOD (Wright/Henderson)
Mathematically exact for any pedigree structure.
Reference: Henderson (1976), Mrode (2005)
F(I) = phi(sire, dam)
phi tabular: expand the more-derived animal always.
=========================== */

var COI_CACHE = new Map();  // id -> F value
var PHI_CACHE = new Map();  // 'a|b' -> phi value (within a subpedigree computation)

function resetCOICache(){ COI_CACHE.clear(); PHI_CACHE.clear(); }

function coiLabelFromPct(pct){
if(pct==null||isNaN(pct)) return '';
if(pct<5)  return 'Low';
if(pct<10) return 'Moderate';
if(pct<20) return 'High';
return 'Very High';
}

/* –––––––––––––––––––––––––
collectAncestors: BFS to get all ancestors of id
Returns array sorted topologically (parents before offspring)
––––––––––––––––––––––––– */
function collectAndSort(rootId){
// BFS collect
var seen = new Set();
var queue = [rootId];
while(queue.length){
var cur = queue.shift();
cur = String(cur||'');
if(!cur||seen.has(cur)) continue;
seen.add(cur);
var r = INDEX.get(cur);
if(!r) continue;
if(r.padre) queue.push(String(r.padre));
if(r.madre) queue.push(String(r.madre));
}
// Topological sort: parents before offspring
var order = [];
var visited = new Set();
function visit(id){
id = String(id||'');
if(!id||visited.has(id)) return;
visited.add(id);
var r = INDEX.get(id);
if(r){
if(r.padre && seen.has(String(r.padre))) visit(String(r.padre));
if(r.madre && seen.has(String(r.madre))) visit(String(r.madre));
}
order.push(id);
}
seen.forEach(function(id){ visit(id); });
return {seen:seen, order:order};
}

/* –––––––––––––––––––––––––
computeTabular: runs Henderson tabular method on
the ancestor subpedigree of rootId.
Returns {F: Map(id->F), phi: Map('a|b'->phi)}
This is O(k^2) where k = unique ancestors - exact.
––––––––––––––––––––––––– */
function computeTabular(rootId){
var collected = collectAndSort(rootId);
var seen  = collected.seen;
var order = collected.order;

var F   = new Map();  // id -> inbreeding coefficient
var phi = new Map();  // 'min|max' -> kinship

function phiKey(a,b){ return a<b?(a+'|'+b):(b+'|'+a); }
function getPhi(a,b){
if(!a||!b) return 0;
if(!seen.has(a)||!seen.has(b)) return 0;
return phi.get(phiKey(a,b))||0;
}

for(var i=0;i<order.length;i++){
var id = order[i];
var r  = INDEX.get(id);
var si = (r&&r.padre) ? String(r.padre) : null;
var di = (r&&r.madre) ? String(r.madre) : null;
// filter to known ancestors only
if(si&&!seen.has(si)) si=null;
if(di&&!seen.has(di)) di=null;

// F(id) = phi(si, di)
var Fi = (si&&di) ? getPhi(si,di) : 0;
F.set(id, Fi);
phi.set(phiKey(id,id), 0.5*(1+Fi));

// phi(id, j) for all j already processed: expand id (later animal)
for(var j=0;j<i;j++){
  var jd = order[j];
  var vsi = si ? getPhi(si, jd) : 0;
  var vdi = di ? getPhi(di, jd) : 0;
  var v;
  if(si&&di)       v = 0.5*(vsi+vdi);
  else if(si)      v = 0.5*vsi;
  else if(di)      v = 0.5*vdi;
  else             v = 0;
  if(v!==0) phi.set(phiKey(id,jd), v);
}

}
return {F:F, phi:phi, seen:seen, order:order};
}

/* –––––––––––––––––––––––––
F_of: inbreeding coefficient of a single animal.
Uses cache; recomputes subpedigree only if needed.
––––––––––––––––––––––––– */
function F_of(id){
if(!INDEX_READY) return null;
id = String(id||'');
if(!id) return 0;
if(COI_CACHE.has(id)) return COI_CACHE.get(id);
var tab = computeTabular(id);
// Cache all computed F values
tab.F.forEach(function(v,k){ COI_CACHE.set(k,v); });
return COI_CACHE.get(id)||0;
}

/* –––––––––––––––––––––––––
phi_of: kinship between two animals a and b.
Builds combined subpedigree of both.
––––––––––––––––––––––––– */
function phi_of(a, b){
if(!INDEX_READY) return null;
a = String(a||''); b = String(b||'');
if(!a||!b) return 0;

// Build subpedigree containing all ancestors of both a and b
var seen = new Set();
var queue = [a, b];
while(queue.length){
var cur = queue.shift();
cur = String(cur||'');
if(!cur||seen.has(cur)) continue;
seen.add(cur);
var r = INDEX.get(cur);
if(!r) continue;
if(r.padre) queue.push(String(r.padre));
if(r.madre) queue.push(String(r.madre));
}

// Topo sort
var order = [];
var visited = new Set();
function visit(id){
id=String(id||'');
if(!id||visited.has(id)) return;
visited.add(id);
var r=INDEX.get(id);
if(r){
if(r.padre&&seen.has(String(r.padre))) visit(String(r.padre));
if(r.madre&&seen.has(String(r.madre))) visit(String(r.madre));
}
order.push(id);
}
seen.forEach(function(id){ visit(id); });

var F   = new Map();
var phi = new Map();
function phiKey(x,y){ return x<y?(x+'|'+y):(y+'|'+x); }
function getPhi(x,y){
if(!x||!y) return 0;
if(!seen.has(x)||!seen.has(y)) return 0;
return phi.get(phiKey(x,y))||0;
}

for(var i=0;i<order.length;i++){
var id=order[i];
var r=INDEX.get(id);
var si=(r&&r.padre)?String(r.padre):null;
var di=(r&&r.madre)?String(r.madre):null;
if(si&&!seen.has(si)) si=null;
if(di&&!seen.has(di)) di=null;

var Fi=(si&&di)?getPhi(si,di):0;
F.set(id,Fi);
phi.set(phiKey(id,id),0.5*(1+Fi));

for(var j=0;j<i;j++){
  var jd=order[j];
  var vsi=si?getPhi(si,jd):0;
  var vdi=di?getPhi(di,jd):0;
  var v;
  if(si&&di) v=0.5*(vsi+vdi);
  else if(si) v=0.5*vsi;
  else if(di) v=0.5*vdi;
  else v=0;
  if(v!==0) phi.set(phiKey(id,jd),v);
}

}

return phi.get(phiKey(a,b))||0;
}

/* –––––––––––––––––––––––––
maxDepthAvailable: how deep is the pedigree
––––––––––––––––––––––––– */
function maxDepthAvailable(rootId){
var maxD=0, seen=new Set();
function walk(id,d){
id=String(id||'');
if(!id||seen.has(id)) return;
seen.add(id);
var r=INDEX.get(id);
if(!r) return;
var s=r.padre?String(r.padre):'', dm=r.madre?String(r.madre):'';
if(s||dm) maxD=Math.max(maxD,d+1);
if(s) walk(s,d+1);
if(dm) walk(dm,d+1);
}
walk(rootId,0);
return maxD;
}

/* ===========================
EXPLAIN COI
=========================== */
function ancestorsWithDepth(startId,maxDepth){
startId=String(startId||'');
if(!startId||startId.indexOf('**UNK**')===0) return new Map();
maxDepth=maxDepth==null?12:maxDepth;
var out=new Map(),q=[{id:startId,d:0}],seen=new Set();
while(q.length){
var cur=q.shift();
if(cur.d>maxDepth) continue;
var key=cur.id+'|'+cur.d;
if(seen.has(key)) continue;
seen.add(key);
if(!out.has(cur.id)||cur.d<out.get(cur.id)) out.set(cur.id,cur.d);
var r=INDEX.get(cur.id);
if(!r) continue;
var s=r.padre?String(r.padre):'',dm=r.madre?String(r.madre):'';
if(s&&s.indexOf('**UNK**')!==0) q.push({id:s,d:cur.d+1});
if(dm&&dm.indexOf('**UNK**')!==0) q.push({id:dm,d:cur.d+1});
}
return out;
}

function computeCoiContribs(subjectId,maxDepth){
var p=getParents(subjectId);
if(!p||!p.sire||!p.dam) return {F:0,items:[]};
var sirePaths=buildPaths(p.sire,maxDepth);
var damPaths=buildPaths(p.dam,maxDepth);
var byAnc=new Map(),totalF=0;
sirePaths.forEach(function(sArr,ancId){
var dArr=damPaths.get(ancId);
if(!dArr) return;
var sumA=0;
for(var i=0;i<sArr.length;i++){
for(var j=0;j<dArr.length;j++){
var sp=sArr[i],dp=dArr[j],ok=true;
sp.set.forEach(function(x){ if(x!==ancId&&dp.set.has(x)) ok=false; });
if(!ok) continue;
var FA=F_of(ancId)||0;
sumA+=Math.pow(0.5,(sp.len+dp.len+1))*(1+FA);
}
}
if(sumA>0){ byAnc.set(ancId,sumA); totalF+=sumA; }
});
var items=[];
byAnc.forEach(function(v,ancId){
var r=INDEX.get(ancId)||{};
items.push({id:ancId,name:r.name||ancId,F:v,pct:totalF>0?(v/totalF)*100:0});
});
items.sort(function(a,b){ return b.F-a.F; });
return {F:totalF,items:items};
}

function getParents(id){
var r=INDEX.get(String(id||''));
if(!r) return {sire:null,dam:null};
return {sire:r.padre||null,dam:r.madre||null};
}
function buildPaths(startId,maxDepth){
var out=new Map();
if(!startId) return out;
function addPath(ancId,len,arr){
if(!out.has(ancId)) out.set(ancId,[]);
out.get(ancId).push({len:len,set:new Set(arr)});
}
function dfs(currId,depth,arr){
if(!currId||depth>maxDepth) return;
addPath(currId,depth,arr);
var p=getParents(currId);
if(!p) return;
if(p.sire&&arr.indexOf(p.sire)===-1) dfs(p.sire,depth+1,arr.concat([p.sire]));
if(p.dam&&arr.indexOf(p.dam)===-1)   dfs(p.dam, depth+1,arr.concat([p.dam]));
}
dfs(startId,0,[startId]);
return out;
}

function openDescendants(root){
  if(!root){ setStatus('Seleziona un soggetto.','warn'); return; }

  var MAX_GEN = 4;

  var getKids = function(id){
    var m = kidsIndex.get(String(id||''));
    if(!m) return [];
    var out = [];
    m.forEach(function(list){ list.forEach(function(ch){ out.push(ch); }); });
    out.sort(function(a,b){ return String(a.birth||'').localeCompare(String(b.birth||'')); });
    return out;
  };

  /* count total unique descendants */
  var allDesc = new Set();
  var countDesc = function(id, depth){
    if(depth > MAX_GEN) return;
    getKids(id).forEach(function(ch){
      if(!allDesc.has(ch.id)){ allDesc.add(ch.id); countDesc(ch.id, depth+1); }
    });
  };
  countDesc(root.id, 1);

  var escIdG = function(id){
    return String(id||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  };

  var renderDescNode = function(rec, depth, maxDepth){
    if(!rec) return '';
    var kids = depth < maxDepth ? getKids(rec.id) : [];
    var sx = String(rec.sesso||'').toUpperCase();
    var tagCls = sx==='M' ? 'sexTag sexM' : sx==='F' ? 'sexTag sexF' : 'sexTag sexU';
    var indent = depth * 18;
    var id = 'desc_' + safeId(rec.id) + '_' + depth;
    var hasKids = getKids(rec.id).length > 0;
    var Fv = F_of(rec.id);
    var fBadge = (Fv!=null&&isFinite(Fv))
      ? ' <span style="font-size:10px;font-weight:700;color:' + ((Fv*100)<5?'#0d9488':(Fv*100)<10?'#d97706':'#ea580c') + '">F:' + (Fv*100).toFixed(1) + '%</span>'
      : '';
    var out = '';
    out += '<div class="descNode" style="padding-left:'+indent+'px" id="'+id+'">';
    out += '<div class="descRow" onclick="__descClick(\''+escIdG(rec.id)+'\',\''+id+'\')">';
    out += '<span class="'+tagCls+'">'+(sx||'?')+'</span>';
    out += '<span class="descName">'+clean(rec.name||'(Senza nome)')+'</span>'+fBadge;
    out += '<span class="small">'+(rec.birth?'n. '+rec.birth:'')+' '+(rec.paese||'')+'</span>';
    if(hasKids && depth < maxDepth) out += '<span class="descToggle" id="tog_'+id+'">▼</span>';
    out += '</div>';
    if(kids.length > 0){
      out += '<div class="descChildren" id="ch_'+id+'">';
      for(var i=0;i<kids.length;i++) out += renderDescNode(kids[i], depth+1, maxDepth);
      out += '</div>';
    }
    out += '</div>';
    return out;
  };

  var maxD = 3;
  var buildHtml = function(md){
    var kids = getKids(root.id);
    var html = '<div class="pModal">';
    html += '<div class="pHead"><div class="pHeadTop">';
    html += '<div><div class="pTitle">Discendenti</div>';
    html += '<div class="pSub">Soggetto: <b>'+clean(root.name||root.id)+'</b></div></div>';
    html += '<div class="bStat"><b>'+allDesc.size+'</b><span>discend.</span></div>';
    html += '</div>';
    html += '<div class="pChips">';
    html += '<div class="chip'+(md===1?' active':'')+'" onclick="__descDepth(1)">1 gen</div>';
    html += '<div class="chip'+(md===2?' active':'')+'" onclick="__descDepth(2)">2 gen</div>';
    html += '<div class="chip'+(md===3?' active':'')+'" onclick="__descDepth(3)">3 gen</div>';
    html += '<div class="chip'+(md===4?' active':'')+'" onclick="__descDepth(4)">4 gen</div>';
    html += '</div></div>';
    html += '<div class="pBody" style="padding:12px">';
    if(!kids.length){
      html += '<div class="small" style="padding:12px">Nessun discendente nel database.</div>';
    } else {
      html += '<div id="descTree" class="descTree">';
      for(var i=0;i<kids.length;i++) html += renderDescNode(kids[i], 1, md);
      html += '</div>';
    }
    html += '</div></div>';
    return html;
  };

  resetModalStack();
  pushModalView('Discendenti', buildHtml(maxD), true, function(){
    window.__descDepth = function(d){
      maxD = d;
      var box = document.getElementById('descTree');
      if(!box) return;
      var kids = getKids(root.id);
      var html = '';
      for(var i=0;i<kids.length;i++) html += renderDescNode(kids[i], 1, d);
      box.innerHTML = html;
      var chips = document.querySelectorAll('.pChips .chip');
      chips.forEach(function(c,i){ c.classList.toggle('active', [1,2,3,4][i]===d); });
    };
    window.__descClick = function(id){
      var r = INDEX.get(id);
      if(!r) return;
      document.getElementById('modal').style.display = 'none';
      resetModalStack();
      selectSubject(r, true);
    };
  });
}

function calcMating(sire, dam){
  var resBox = document.getElementById('matingResult');
  if(!resBox) return;
  resBox.innerHTML = '<div class="small">Calcolo in corso…</div>';

  var phi = phi_of(String(sire.id), String(dam.id));
  if(phi==null||isNaN(phi)) phi = 0;
  var coiPct = phi * 100;

  var F_sire = F_of(sire.id);
  var F_dam  = F_of(dam.id);
  var sireCoiPct = (F_sire!=null&&isFinite(F_sire)) ? F_sire*100 : null;
  var damCoiPct  = (F_dam!=null&&isFinite(F_dam))   ? F_dam*100  : null;
  var rAB = phi != null ? 2*phi : null;

  var coiClass = coiPct<3 ? 'coiLow' : coiPct<6 ? 'coiMid' : 'coiHigh';

  var calc = computeCoiContribs_pair(sire.id, dam.id, 12);

  var html = '<div class="pBody" style="padding:12px;margin-top:0;border-radius:14px">';
  html += '<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:12px">';
  html += '<div class="bStat '+coiClass+'"><b>'+coiPct.toFixed(2)+'%</b><span>COI cuccioli (F)</span></div>';
  html += '</div>';
  html += '<div class="hr"></div>';
  html += '<div class="profileGrid">';
  html += '<div class="k">COI cuccioli (F)</div><div class="v">'+coiPct.toFixed(4)+'%</div>';
  html += '<div class="k">φ(padre,madre)</div><div class="v">'+phi.toFixed(6)+'</div>';
  if(rAB!=null) html += '<div class="k">Coeff. parentela</div><div class="v">'+(rAB*100).toFixed(2)+'%</div>';
  if(sireCoiPct!=null) html += '<div class="k">COI padre</div><div class="v">'+sireCoiPct.toFixed(2)+'%</div>';
  if(damCoiPct!=null)  html += '<div class="k">COI madre</div><div class="v">'+damCoiPct.toFixed(2)+'%</div>';
  html += '</div>';

  if(calc && calc.items && calc.items.length){
    html += '<div class="hr"></div><div class="sectionTitle">Antenati comuni</div>';
    html += '<div style="margin-top:8px">';
    var items = calc.items.slice(0,8);
    for(var i=0;i<items.length;i++){
      var it = items[i];
      var bw = Math.max(2, Math.min(100, it.pct));
      html += '<div class="pItem" style="cursor:default">';
      html += '<div class="pItemTop"><div class="pItemName">'+clean(it.name||it.id)+'</div><div class="pRight">'+it.pct.toFixed(2)+'%</div></div>';
      html += '<div class="pBar"><div class="pBarFill" style="width:'+bw.toFixed(1)+'%"></div></div>';
      html += '</div>';
    }
    html += '</div>';
  } else {
    html += '<div class="hr"></div><div class="small">Nessun antenato comune trovato – cuccioli non consanguinei.</div>';
  }
  html += '</div>';
  resBox.innerHTML = html;
}

function computeCoiContribs_pair(sireId, damId, maxDepth){
  if(!sireId||!damId) return {F:0, items:[]};
  var sirePaths = buildPaths(sireId, maxDepth);
  var damPaths  = buildPaths(damId,  maxDepth);
  var byAnc = new Map(), totalF = 0;
  sirePaths.forEach(function(sArr, ancId){
    var dArr = damPaths.get(ancId);
    if(!dArr) return;
    var sumA = 0;
    for(var i=0;i<sArr.length;i++){
      for(var j=0;j<dArr.length;j++){
        var sp = sArr[i], dp = dArr[j], ok = true;
        sp.set.forEach(function(x){ if(x!==ancId && dp.set.has(x)) ok=false; });
        if(!ok) continue;
        var FA = F_of(ancId)||0;
        sumA += Math.pow(0.5, (sp.len+dp.len+1)) * (1+FA);
      }
    }
    if(sumA > 0){ byAnc.set(ancId, sumA); totalF += sumA; }
  });
  var items = [];
  byAnc.forEach(function(v, ancId){
    var r = INDEX.get(ancId)||{};
    items.push({id:ancId, name:r.name||ancId, F:v, pct: totalF>0?(v/totalF)*100:0});
  });
  items.sort(function(a,b){ return b.F - a.F; });
  return {F:totalF, items:items};
}

/* ── RICERCA AVANZATA ── */
(function(){

  /* ── stato filtri ── */
  var FILTERS = { sesso:'', paese:'', tipo:'', yearFrom:'', yearTo:'', allevatore:'', coiMax:'' };

  /* ── popola i select con i valori dal DB ── */
  function populateSelects(){
    var pMap = {}, tMap = {};
    for(var i=0;i<DB.length;i++){
      var r=DB[i];
      if(r.paese){ var p=r.paese.trim().toUpperCase(); if(p) pMap[p]=(pMap[p]||0)+1; }
      if(r.tipo){ var t=canonTipo(r.tipo); if(t) tMap[t]=(tMap[t]||0)+1; }
    }
    var pSel=$('fPaese'), tSel=$('fTipo');
    if(pSel){
      var ps=Object.keys(pMap).sort();
      for(var i=0;i<ps.length;i++){
        var o=document.createElement('option'); o.value=ps[i];
        o.textContent=ps[i]+' ('+pMap[ps[i]]+')'; pSel.appendChild(o);
      }
    }
    if(tSel){
      var ts=Object.keys(tMap).sort(function(a,b){ return tMap[b]-tMap[a]; });
      for(var i=0;i<ts.length;i++){
        if(!tMap[ts[i]]) continue;
        var o=document.createElement('option'); o.value=ts[i];
        var meta=TIPO_META[ts[i]];
        o.textContent=(meta?meta.label:ts[i])+' ('+tMap[ts[i]]+')'; tSel.appendChild(o);
      }
    }
  }

  /* ── matching con filtri ── */
  function matchesFilters(r){
    if(!r||!r.id) return false;
    var q=clean(($('q')||{}).value||'');
    if(q && !startsWordMatch(r,q)) return false;
    if(FILTERS.sesso){
      var sx=String(r.sesso||'').toUpperCase();
      if(sx!==FILTERS.sesso) return false;
    }
    if(FILTERS.paese){
      var rp=(r.paese||'').trim().toUpperCase();
      if(rp!==FILTERS.paese) return false;
    }
    if(FILTERS.tipo){
      if(canonTipo(r.tipo)!==FILTERS.tipo) return false;
    }
    if(FILTERS.allevatore){
      var ra=clean(r.allevatore||'').toLowerCase();
      if(ra.indexOf(FILTERS.allevatore.toLowerCase())<0) return false;
    }
    if(FILTERS.yearFrom||FILTERS.yearTo){
      var yy=r.birth?parseInt(String(r.birth).slice(0,4),10):null;
      if(yy==null||isNaN(yy)) return false;
      if(FILTERS.yearFrom && yy<parseInt(FILTERS.yearFrom,10)) return false;
      if(FILTERS.yearTo   && yy>parseInt(FILTERS.yearTo,10))   return false;
    }
    if(FILTERS.coiMax!==''){
      var Fv=F_of(r.id);
      if(Fv==null||!isFinite(Fv)) return false;
      if((Fv*100)>parseFloat(FILTERS.coiMax)) return false;
    }
    return true;
  }

  /* ── aggiorna chip bar ── */
  function renderChips(){
    var bar=$('fChipBar'); if(!bar) return;
    bar.innerHTML='';
    var labels={
      sesso:    FILTERS.sesso ? 'Sesso: '+FILTERS.sesso : '',
      paese:    FILTERS.paese ? 'Paese: '+FILTERS.paese : '',
      tipo:     FILTERS.tipo  ? 'Tipo: '+(TIPO_META[FILTERS.tipo]?TIPO_META[FILTERS.tipo].label:FILTERS.tipo) : '',
      allevatore: FILTERS.allevatore ? 'Allev: '+FILTERS.allevatore : '',
      year:     (FILTERS.yearFrom||FILTERS.yearTo)
                  ? 'Anno: '+(FILTERS.yearFrom||'…')+'–'+(FILTERS.yearTo||'…') : '',
      coiMax:   FILTERS.coiMax!=='' ? 'COI ≤'+FILTERS.coiMax+'%' : ''
    };
    var activeCount=0;
    Object.keys(labels).forEach(function(k){
      if(!labels[k]) return;
      activeCount++;
      var chip=document.createElement('span'); chip.className='fChip';
      chip.innerHTML=labels[k]+'<span class="fChipX" title="Rimuovi">✕</span>';
      chip.querySelector('.fChipX').onclick=function(){
        if(k==='sesso'){ FILTERS.sesso=''; var s=$('fSesso'); if(s) s.value=''; }
        else if(k==='paese'){ FILTERS.paese=''; var s=$('fPaese'); if(s) s.value=''; }
        else if(k==='tipo'){ FILTERS.tipo=''; var s=$('fTipo'); if(s) s.value=''; }
        else if(k==='allevatore'){ FILTERS.allevatore=''; var i=$('fAllevatore'); if(i) i.value=''; }
        else if(k==='year'){ FILTERS.yearFrom=''; FILTERS.yearTo='';
          var a=$('fYearFrom'),b=$('fYearTo'); if(a) a.value=''; if(b) b.value=''; }
        else if(k==='coiMax'){ FILTERS.coiMax=''; var i=$('fCoiMax'); if(i) i.value=''; }
        renderChips(); runSearch();
      };
      bar.appendChild(chip);
    });
    /* update filter button label */
    var btn=$('btnAdvFilter'), lbl=$('btnAdvFilterLbl');
    if(btn){ btn.classList.toggle('active', activeCount>0); }
    if(lbl){ lbl.textContent = activeCount>0 ? 'Filtri ('+activeCount+')' : 'Filtri'; }
  }

  /* ── esegui ricerca e aggiorna dropdown ── */
  function runSearch(){
    var q=clean(($('q')||{}).value||'');
    var hasQuery=q.length>0;
    var hasFilters=Object.keys(FILTERS).some(function(k){ return FILTERS[k]!==''; });
    var list=$('ddList'), count=$('srchCount');
    if(!list) return;
    list.innerHTML='';

    if(!hasQuery && !hasFilters){
      closeDD();
      if(count) count.textContent='';
      return;
    }

    var results=[];
    for(var i=0;i<DB.length;i++){
      if(matchesFilters(DB[i])) results.push(DB[i]);
      if(results.length>=200) break;
    }

    /* count total without cap */
    var total=0;
    if(results.length<200){
      total=results.length;
    } else {
      for(var i=0;i<DB.length;i++){ if(matchesFilters(DB[i])) total++; }
    }

    if(count){
      count.textContent = total===0 ? 'Nessun risultato.'
        : total===1 ? '1 soggetto trovato.'
        : total+' soggetti trovati'+(total>200?' (mostrando i primi 200)':'')+ '.';
    }

    if(results.length===0){
      var em=document.createElement('div'); em.className='ddItem';
      em.innerHTML='<div class="ddTitle" style="opacity:.5">Nessun risultato</div>';
      list.appendChild(em);
      openDD(); return;
    }

    for(var i=0;i<results.length;i++){
      (function(rec){
        var it=document.createElement('div'); it.className='ddItem';
        var sx=String(rec.sesso||'').toUpperCase();
        var sxEl=sx==='M'?'<span style="color:#93c5fd;font-size:10px;font-weight:800;margin-right:3px">M</span>'
                :sx==='F'?'<span style="color:#f9a8d4;font-size:10px;font-weight:800;margin-right:3px">F</span>':'';
        it.innerHTML='<div class="ddTitle">'+sxEl+clean(rec.name||'(Senza nome)')+'</div>'+
          '<div class="ddMeta">'+
          (rec.allevatore?'all. '+rec.allevatore:'')+
          (rec.paese?' · '+rec.paese:'')+
          (rec.birth?' · '+rec.birth.slice(0,4):'')+
          '  ['+rec.id+']'+
          '</div>';
        it.onmousedown=function(ev){ ev.preventDefault(); };
        it.onclick=function(){
          $('q').value=clean(rec.name||rec.id)+' ['+rec.id+']';
          updateClearButton(); closeDD();
          if(count) count.textContent='';
          selectSubject(rec,true);
        };
        list.appendChild(it);
      })(results[i]);
    }
    openDD();
  }

  /* ── init ── */
  var inp=$('q'); if(!inp) return;

  /* wire text input */
  inp.addEventListener('input', function(){ updateClearButton(); runSearch(); });
  inp.addEventListener('keydown', function(e){
    if(e.key==='Escape'){ inp.value=''; updateClearButton(); closeDD(); var c=$('srchCount'); if(c) c.textContent=''; }
    if(e.key==='Enter'){
      var first=$('ddList')&&$('ddList').querySelector('.ddItem');
      if(first) first.click();
    }
  });
  inp.addEventListener('focus', function(){ if(matchesFilters||clean(inp.value)) runSearch(); });

  /* wire clear X */
  var clr=$('ddClear');
  if(clr) clr.onclick=function(){
    inp.value=''; updateClearButton(); closeDD();
    var c=$('srchCount'); if(c) c.textContent='';
    runSearch();
    inp.focus();
  };

  /* close on outside click */
  document.addEventListener('click',function(e){
    var wrap=$('dd'); if(!wrap) return;
    var fp=$('filterPanel');
    if(fp && fp.contains(e.target)) return;
    if(!wrap.contains(e.target)) closeDD();
  });

  /* ── filter panel toggle ── */
  var btnF=$('btnAdvFilter');
  if(btnF) btnF.onclick=function(){
    var fp=$('filterPanel'); if(!fp) return;
    fp.classList.toggle('open');
  };

  /* ── wire all filter inputs ── */
  function wireSelect(id, key){
    var el=$(id); if(!el) return;
    el.addEventListener('change',function(){ FILTERS[key]=el.value; renderChips(); runSearch(); });
  }
  function wireInput(id, key, delay){
    var el=$(id); if(!el) return;
    var t;
    el.addEventListener('input',function(){
      clearTimeout(t);
      t=setTimeout(function(){ FILTERS[key]=el.value.trim(); renderChips(); runSearch(); }, delay||300);
    });
  }
  wireSelect('fSesso','sesso');
  wireSelect('fPaese','paese');
  wireSelect('fTipo','tipo');
  wireInput('fAllevatore','allevatore');
  wireInput('fYearFrom','yearFrom');
  wireInput('fYearTo','yearTo');
  wireInput('fCoiMax','coiMax',400);

  /* ── enable on DB load ── */
  var origSetEnabled=setEnabled;
  setEnabled=function(v){
    origSetEnabled(v);
    var b=$('btnAdvFilter'); if(b) b.disabled=!v;
    if(v) populateSelects();
  };

  /* keep original renderDD compatible (used elsewhere) */
  window.__legacyRenderDD=renderDD;

})();

  var id=historyBack.pop();
  if(SUBJECT) historyFwd.push(SUBJECT.id);
  var rec=INDEX.get(String(id));
  if(rec){ SUBJECT=null; render(rec,false); }
  updateHistoryButtons();
};
if($('btnFwd')) $('btnFwd').onclick=function(){
  if(!historyFwd.length) return;
  var id=historyFwd.pop();
  if(SUBJECT) historyBack.push(SUBJECT.id);
  var rec=INDEX.get(String(id));
  if(rec){ SUBJECT=null; render(rec,false); }
  updateHistoryButtons();
};

if($('zoomIn'))  $('zoomIn').onclick =function(){ zoomAt(1/0.82); };
if($('zoomOut')) $('zoomOut').onclick=function(){ zoomAt(0.82); };

/* ── ALLEVATORI ── */
if($('btnBreeders')) $('btnBreeders').onclick=function(){ openBreedersDirectory(); };

/* ── STAMPA PEDIGREE ── */
if($('btnPrint')) $('btnPrint').onclick=function(){ if(SUBJECT) printPedigree(SUBJECT); };

/* ── MATING SIMULATOR ── */
if($('btnMating')) $('btnMating').onclick=function(){ openMatingSimulator(); };

/* ── DISCENDENTI ── */
if($('btnDescendants')) $('btnDescendants').onclick=function(){ if(SUBJECT) openDescendants(SUBJECT); };

/* ── SHARE ── */
if($('btnShare')) $('btnShare').onclick=function(){
  if(!SUBJECT) return;
  var url=location.href.split('#')[0]+'#'+encodeURIComponent(SUBJECT.id);
  if(navigator.share){
    navigator.share({title:SUBJECT.name||SUBJECT.id, url:url}).catch(function(){});
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(function(){ setStatus('Link copiato!','ok'); });
  } else {
    prompt('Copia il link:', url);
  }
};

/* ── PAN / ZOOM / PINCH ── */
attachPan($('svg'));
attachWheelZoom($('svg'));
attachPinchZoom($('svg'));

/* ── MODAL: chiudi, backdrop ── */
if($('modalClose')) $('modalClose').onclick=function(){
  $('modal').style.display='none';
  $('lightboxWrap').style.display='none';
  if($('profileScroll')) $('profileScroll').style.display='none';
  if($('profileBox')) $('profileBox').innerHTML='';
  resetModalStack(); MODAL_SUBJECT=null;
};
if($('modal')) $('modal').addEventListener('click',function(e){
  if(e.target===$('modal')){
    $('modal').style.display='none';
    $('lightboxWrap').style.display='none';
    if($('profileScroll')) $('profileScroll').style.display='none';
    if($('profileBox')) $('profileBox').innerHTML='';
    resetModalStack(); MODAL_SUBJECT=null;
  }
});

/* ── STAMPA PROFILO ── */
if($('modalPrint')) $('modalPrint').onclick=function(){ printModal(); };

/* ── RETURN BUTTON ── */
if($('btnReturn')) $('btnReturn').onclick=function(){ executeReturn(); };

/* ── KEYBOARD ── */
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    if($('modal')&&$('modal').style.display==='flex'){
      $('modalClose').onclick&&$('modalClose').onclick();
    }
  }
});


window.addEventListener('hashchange',function(){ closeDD(); selectFromHash(); });
/* ── AUTO-LOAD BUNDLED DB ── */
(function(){
  if(!BUNDLED_DB||!BUNDLED_DB.length) return;
  INDEX_READY=false;
  DB=BUNDLED_DB.map(function(r){
    r=r||{};
    var foto_list=[];
    if(Array.isArray(r.foto_list)) foto_list=r.foto_list.filter(Boolean).slice(0,5);
    else if(Array.isArray(r.foto)) foto_list=r.foto.filter(Boolean).slice(0,5);
    else if(typeof r.foto==='string'&&r.foto) foto_list=[r.foto];
    return {id:clean(r.id),name:clean(r.name),sesso:sexNorm(r.sesso),
      pedigree:clean(r.pedigree),birth:clean(r.birth),colore:clean(r.colore),
      paese:clean(r.paese),allevatore:clean(r.allevatore),
      proprietario:clean(r.proprietario),tipo:clean(r.tipo),
      padre:clean(r.padre),madre:clean(r.madre),note:clean(r.note),
      foto:(typeof r.foto==='string'?r.foto:null),foto_list:foto_list};
  }).filter(function(r){ return r.id; });
  rebuildIndex(); buildKidsIndex(); buildBreederIndex();
  INDEX_READY=true; resetCOICache();
  setEnabled(true);
  setStatus('Database caricato: '+DB.length+' soggetti.','ok');
  setTimeout(function(){
    if($('q')){ $('q').focus(); updateClearButton(); }
    selectFromHash();
  },50);
})();
