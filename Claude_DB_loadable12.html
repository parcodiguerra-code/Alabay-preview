
<!doctype html>

<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<title>Database Alabay Club Italia</title>

<style>

:root{
  --bg:#0a1120; --panel:#0d1729; --panel2:#101e30;
  --ink:#dde4f0; --mut:#8899b8; --border:#1a2540;
  --ok:#6ee7b7; --warn:#fcd34d; --bad:#f87171; --accent:#60a5fa;
  /* COI palette — refined jewel tones */
  --coi-low-fg:#5eead4;   --coi-low-bg:rgba(20,184,166,.09);   --coi-low-border:rgba(20,184,166,.25);
  --coi-mid-fg:#fbbf24;   --coi-mid-bg:rgba(245,158,11,.09);   --coi-mid-border:rgba(245,158,11,.28);
  --coi-high-fg:#fb923c;  --coi-high-bg:rgba(234,88,12,.09);   --coi-high-border:rgba(234,88,12,.28);
  --coi-vhigh-fg:#f87171; --coi-vhigh-bg:rgba(220,38,38,.09);  --coi-vhigh-border:rgba(220,38,38,.28);
  /* fonts */
  --f-display:"Playfair Display",Georgia,serif;
  --f-body:"Inter",system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  background:radial-gradient(ellipse 120% 80% at 50% 0%,#0f1e3a,#070d1c 60%);
  color:var(--ink);
  font-family:var(--f-body);
  overflow:hidden;
}

/* ── dot-grid background texture on SVG stage ── */
#svg{
  background-image:
    radial-gradient(circle,rgba(148,163,184,.18) 1px,transparent 1px);
  background-size:24px 24px;
  background-color:#060c1a;
}

/* ── keyframe animations ── */
@keyframes fadeSlideUp{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeIn{
  from{opacity:0}to{opacity:1}
}
@keyframes nodeAppear{
  from{opacity:0;transform:scale(.94)}
  to{opacity:1;transform:scale(1)}
}

/* modal entrance */
.modalInner{
  animation: fadeSlideUp .18s cubic-bezier(.22,1,.36,1) both;
}
.modal[style*="flex"] .modalInner{
  animation: fadeSlideUp .18s cubic-bezier(.22,1,.36,1) both;
}

/* sidebar profile fade-in */
.profileTitle, .profileSub, .kv, .sidePhotos, #kidsBox{
  animation: fadeIn .22s ease both;
}

/* header */
header{
  position:sticky; top:0; z-index:50;
  background:rgba(11,18,32,.92);
  backdrop-filter: blur(8px);
  border-bottom:1px solid var(--border);
}
.bar{
  display:flex;gap:4px;align-items:center;flex-wrap:wrap;
  padding:8px 14px;
}
.bar-sep{
  width:1px;height:22px;
  background:rgba(148,163,184,.15);
  margin:0 6px;
  flex-shrink:0;
}
.bar-group{display:flex;align-items:center;gap:4px;}
.brand{font-weight:700;font-family:var(--f-display);letter-spacing:.3px;font-size:16px;opacity:.95;color:#c7d9f5;}
.sp{flex:1}
.btn{
  border:1px solid rgba(148,163,184,.18);
  background:rgba(13,21,42,.60);
  color:var(--ink);
  padding:7px 10px;
  border-radius:10px;
  font-weight:600;
  font-size:13px;
  font-family:var(--f-body);
  cursor:pointer;
  user-select:none;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  gap:5px;
  transition:background .15s,border-color .15s,box-shadow .15s,opacity .15s;
  letter-spacing:.01em;
}
.btn:not(:disabled):hover{
  background:rgba(96,165,250,.10);
  border-color:rgba(96,165,250,.30);
  box-shadow:0 2px 12px rgba(0,0,0,.25);
}
.btn:not(:disabled):active{transform:translateY(1px)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn.ghost{background:transparent;border-color:transparent}
.btn.ghost:not(:disabled):hover{background:rgba(96,165,250,.08);border-color:rgba(96,165,250,.20)}
.pill{
  border:1px solid rgba(148,163,184,.18);
  background:rgba(13,20,40,.5);
  color:rgba(148,163,184,.8);
  padding:5px 11px;
  border-radius:999px;
  font-size:12px;
  font-weight:500;
  white-space:nowrap;
  font-variant-numeric:tabular-nums;
  letter-spacing:.02em;
}
#pillCOI,#pillF,#pillTipo{ transition:color .3s,border-color .3s,opacity .3s; }
.status{
  padding:6px 10px;border-radius:12px;
  border:1px solid rgba(148,163,184,.2);
  background:rgba(15,23,42,.35);
  color:var(--mut); font-size:13px;
}
.status.ok{color:var(--ok); border-color:rgba(134,239,172,.35)}
.status.warn{color:var(--warn); border-color:rgba(253,230,138,.35)}
.status.bad{color:var(--bad); border-color:rgba(252,165,165,.35)}

/* MAIN LAYOUT */
main{
  height:calc(100dvh - 64px);
  display:grid;
  grid-template-columns: minmax(0, 1fr) 360px;
  gap:12px;
  padding:12px;
  min-height:0;
}
@media (max-width: 980px){
  body{overflow:auto}
  main{height:auto; grid-template-columns:1fr; min-height:auto;}
}

.card{
  border:1px solid rgba(148,163,184,.18);
  background:rgba(15,23,42,.55);
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
  display:flex;
  flex-direction:column;
  min-height:0;
  overflow: visible;
}
.cardHead{
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  padding:10px 12px;
  border-bottom:1px solid rgba(148,163,184,.12);
  background:rgba(15,23,42,.55);
  flex:0 0 auto;
}
.cardBody{
  padding:10px 12px;
  flex:1 1 auto;
  min-height:0;
  overflow: visible;
}

/* search dropdown */
.dd{position:relative; width:min(560px, 100%)}
input[type="text"]{
  width:100%;
  padding:10px 40px 10px 12px;
  border-radius:12px;
  border:1px solid rgba(148,163,184,.22);
  background:rgba(17,24,39,.85);
  color:var(--ink);
  outline:none;
  font-size:14px;
}
input[type="text"]:focus{
  border-color: rgba(96,165,250,.65);
  box-shadow: 0 0 0 3px rgba(96,165,250,.18);
}
.ddClear{
  position:absolute;
  right:8px;
  top:50%;
  transform:translateY(-50%);
  width:28px; height:28px;
  border-radius:10px;
  border:1px solid rgba(148,163,184,.18);
  background:rgba(15,23,42,.45);
  color:rgba(229,231,235,.9);
  cursor:pointer;
  display:none;
  align-items:center;
  justify-content:center;
  font-weight:950;
}
.ddClear:hover{background:rgba(96,165,250,.10)}
.ddList{
  position:absolute; left:0; right:0;
  top:calc(100% + 6px);
  background:rgba(15,23,42,.96);
  border:1px solid rgba(148,163,184,.22);
  border-radius:14px;
  max-height:340px;
  overflow:auto;
  display:none;
  z-index:999;
}
.ddItem{padding:10px 12px; border-bottom:1px solid rgba(148,163,184,.10); cursor:pointer}
.ddItem:last-child{border-bottom:none}
.ddItem:hover{background:rgba(96,165,250,.10)}
.ddTitle{font-weight:950}
.ddMeta{color:rgba(148,163,184,.95); font-size:12px; margin-top:4px}

/* SVG area */
.stage{ width:100%; height:100%; min-height:0; }
#svg{
  width:100%;
  height:100%;
  display:block;
  background:#060d1a;
  border-radius:16px;
  touch-action:none;
}

/* ── EDGES ─────────────────────────────── */
.edge{
  fill:none;
  stroke:rgba(148,163,184,.28);
  stroke-width:1.5;
  stroke-linecap:square;
}
.edge.isFocus{ stroke:rgba(96,165,250,.7); stroke-width:2; }
.edge.isDim  { stroke:rgba(148,163,184,.15); }

/* ── NODE BASE ─────────────────────────── */
.node .rect{
  fill:#0d1528;
  stroke:rgba(148,163,184,.18);
  stroke-width:1;
  rx:10; ry:10;
}
/* sire: blu acciaio */
.node.sire .rect{
  fill:#08152e;
  stroke:rgba(71,120,210,.45);
  stroke-width:1;
}
/* dam: rosa antico */
.node.dam .rect{
  fill:#180d1e;
  stroke:rgba(180,80,140,.45);
  stroke-width:1;
}
/* subject: card grande, bordo luminoso */
.node.subject .rect{
  fill:#0a1628;
  stroke:rgba(96,165,250,.9);
  stroke-width:2.5;
  filter:drop-shadow(0 0 18px rgba(96,165,250,.22));
}
/* unknown / fondatore */
.node.unknown .rect{
  fill:rgba(148,163,184,.04);
  stroke:rgba(148,163,184,.14);
  stroke-dasharray:5 4;
  stroke-width:1;
}

/* ── ACCENTO SIRE/DAM (barra laterale) ── */
.node .sideBar{ pointer-events:none; }

/* ── TESTI ─────────────────────────────── */
.tName{
  fill:#dce8fa;
  font-weight:700;
  font-size:13.5px;
  font-family:"Playfair Display",Georgia,serif;
  letter-spacing:.05px;
  pointer-events:none;
}
.tName.isSubject{
  font-size:16.5px;
  font-weight:800;
  fill:#f0f6ff;
  font-family:"Playfair Display",Georgia,serif;
  letter-spacing:.1px;
}
.tMeta{
  fill:rgba(148,163,184,.80);
  font-size:11.5px;
  pointer-events:none;
}
.tYear{
  fill:rgba(148,163,184,.55);
  font-size:10.5px;
  pointer-events:none;
  font-variant-numeric:tabular-nums;
}
.tUnk{
  fill:rgba(148,163,184,.30);
  font-size:12px;
  font-style:italic;
  pointer-events:none;
}

/* ── CONSANGUINEITA' (ripetizioni) ─────── */
/* x2: ambra lieve */
.node.repeat    .rect{ stroke:rgba(234,179,8,.65);  stroke-width:2;   }
/* x3: ambra piena */
.node.repeatMid .rect{ stroke:rgba(234,179,8,.90);  stroke-width:2.5; }
/* x4+: arancio acceso - segnale forte */
.node.repeatHigh .rect{
  stroke:rgba(249,115,22,.95);
  stroke-width:3;
  filter:drop-shadow(0 0 8px rgba(249,115,22,.30));
}
.repBadge     { fill:rgba(234,179,8,.95); }
.repBadgeMid  { fill:rgba(249,115,22,.95); }
.repBadgeHigh { fill:rgba(239,68,68,.95); }
.repBadgeText { fill:#0b1220; font-size:10px; font-weight:800; pointer-events:none; }

/* ── SESSO PILL ────────────────────────── */
.pillM{ fill:rgba(59,110,210,.90); }
.pillF{ fill:rgba(168,65,130,.90); }
.pillText{ fill:#fff; font-size:10px; font-weight:700; pointer-events:none; }

/* ── THUMB FOTO ────────────────────────── */
.thumbBorder{ stroke:rgba(255,255,255,.18); stroke-width:1; }
.node image { cursor:pointer; }

/* ── HOVER / FOCUS ─────────────────────── */
.node:not(.unknown){ cursor:pointer; }
.node:not(.unknown):hover .rect{
  stroke:rgba(96,165,250,.85);
  stroke-width:2;
  filter:drop-shadow(0 6px 20px rgba(0,0,0,.5));
}
.node.unknown{ cursor:default; }
.node .rect, .edge{
  transition:stroke .15s ease, stroke-width .15s ease, filter .2s ease, opacity .15s ease;
}
.node.isFocus .rect{
  stroke-width:2.5;
  filter:drop-shadow(0 0 20px rgba(96,165,250,.25)) brightness(1.04);
}
.node.isDim   .rect{ opacity:.60; }
.node.isDim   .tName{ opacity:.70; }
.node.isDim   .tMeta{ opacity:.55; }

/* sidebar */
.sTitle{font-weight:700;font-family:var(--f-display);font-size:16px;color:#c7d9f5;letter-spacing:-.1px;}
.kv{margin-top:10px; display:grid; grid-template-columns: 120px 1fr; gap:6px 10px; font-size:13px}
.k{color:rgba(148,163,184,.9); opacity:.65; font-weight:600;}
.v{color:var(--ink); font-weight:800}
.hr{height:1px;background:rgba(148,163,184,.12); margin:12px 0}
.linkish{cursor:pointer; text-decoration:underline; text-decoration-color:rgba(96,165,250,.6)}
.linkish:hover{color:var(--accent)}

.sidePhotos{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}
.sidePhotos img{
  width:86px; height:86px; object-fit:cover;
  border-radius:12px;
  border:1px solid rgba(148,163,184,.18);
  cursor:pointer;
}

/* CHILDREN */
.sectionTitle{font-weight:700;font-family:var(--f-display);margin-top:14px;letter-spacing:.05px;font-size:13.5px;color:#c7d9f5;}
.small{ color:rgba(148,163,184,.85); font-size:12px; }

.childGroup{
  margin-top:10px;
  border:1px solid rgba(148,163,184,.14);
  border-radius:14px;
  overflow:hidden;
  background:rgba(15,23,42,.22);
}
.childGroup.mateIsDam{border-left:3px solid rgba(236,72,153,.45)}
.childGroup.mateIsSire{border-left:3px solid rgba(59,130,246,.45)}

.childHead{
  padding:10px 12px;
  background:rgba(15,23,42,.50);
  border-bottom:1px solid rgba(148,163,184,.10);
  font-weight:900;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  letter-spacing:.3px;
  font-size:13px;
}
.childBody{ padding:10px 12px; display:none; background:rgba(17,24,39,.30); }

.childRow{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:14px;
  padding:10px 0;
  border-bottom:1px solid rgba(148,163,184,.08);
  cursor:pointer;
  transition:background .12s ease;
}
.childRow:last-child{ border-bottom:none; }
.childRow:hover{ background:rgba(96,165,250,.05); }
.childLeft{ min-width:0; }
.childName{
  font-weight:850;
  font-style:italic;
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
}
.childMeta{ font-size:12px; color:rgba(148,163,184,.88); margin-top:2px; }
.childRight{
  font-size:12px;
  font-weight:800;
  color:rgba(148,163,184,.85);
  white-space:nowrap;
  padding-top:2px;
}

/* sex tag */
.sexTag{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:18px;
  height:16px;
  border-radius:999px;
  font-size:10px;
  font-weight:900;
  color:#fff;
  opacity:.85;
}
.sexM{ background:rgba(59,130,246,.70); }
.sexF{ background:rgba(236,72,153,.70); }
.sexU{ background:rgba(148,163,184,.45); }

/* modal */
.modal{
  position:fixed; inset:0;
  background:rgba(0,0,0,.65);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  padding:18px;
}
.modalInner{
  width:min(980px, 100%);
  border-radius:18px;
  border:1px solid rgba(148,163,184,.18);
  background:rgba(10,17,35,.97);
  padding:12px;
  display:flex;
  flex-direction:column;
  max-height:86vh;
  box-shadow:0 24px 80px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04);
  animation:fadeSlideUp .2s cubic-bezier(.22,1,.36,1) both;
}
.modal{backdrop-filter:blur(4px);}
.modalTop{display:flex; gap:8px; justify-content:space-between; align-items:center; margin-bottom:10px}
.modalImg{width:100%; height:min(70vh, 560px); object-fit:contain; border-radius:12px; background:#0b1220; border:1px solid rgba(148,163,184,.12)}
.modalBodyScroll{
  overflow:auto;
  max-height:calc(86vh - 54px);
  padding-right:8px;
  -webkit-overflow-scrolling: touch;
}
.modalBodyScroll::-webkit-scrollbar{ width:10px; }
.modalBodyScroll::-webkit-scrollbar-thumb{ background:rgba(148,163,184,.16); border-radius:10px; }

.profileGrid{display:grid; grid-template-columns: 1fr 1fr; gap:8px 12px; font-size:13px; margin-top:10px}
.profileGrid .k{color:rgba(148,163,184,.9)}
.profileGrid .v{font-weight:850}
.profileTitle{font-weight:700;font-family:var(--f-display);font-size:19px;cursor:pointer;color:#edf2ff;letter-spacing:-.1px;}
.profileSub{color:rgba(148,163,184,.95); margin-top:4px; font-size:13px}
.profileActions{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}

/* Premium breeders UI */
.pModal{ display:flex; flex-direction:column; gap:10px; }
.pHead{
  position:sticky; top:0; z-index:5;
  padding:18px 22px 14px 22px;
  border:1px solid rgba(148,163,184,.10);
  border-bottom:1px solid rgba(255,255,255,.06);
  border-radius:14px;
  background:rgba(15,23,42,.50);
  backdrop-filter: blur(8px);
}
.pHeadTop{
  display:flex;
  gap:10px;
  justify-content:space-between;
  align-items:flex-start;
  flex-wrap:wrap;
}
.pTitle{font-weight:700;font-family:var(--f-display);font-size:19px;letter-spacing:-.1px;color:#edf2ff;}
.pSub{ margin-top:6px; font-size:14px; opacity:.9; line-height:1.35; }
.pSub b{ font-weight:800; letter-spacing:.25px; color:rgba(255,255,255,.96); }
.pChips{ display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }

.chip{
  border:1px solid rgba(255,255,255,.06);
  background:rgba(255,255,255,.04);
  border-radius:20px;
  padding:6px 10px;
  font-size:12px;
  color:rgba(148,163,184,.86);
  font-weight:800;
  white-space:nowrap;
  cursor:pointer;
  user-select:none;
}
.chip:hover{ background:rgba(96,165,250,.08); }
.chip.active{
  border-color:rgba(96,165,250,.45);
  box-shadow:0 4px 14px rgba(96,165,250,.25);
  background:linear-gradient(135deg, rgba(96,165,250,.18), rgba(96,165,250,.10));
  color:rgba(229,231,235,.92);
}
.chipInfo{
  cursor: default;
}
.chipInfo:hover{
  background: rgba(255,255,255,.04);
  box-shadow: none;
}
.chipDepth{
  cursor: pointer;
  transition: all .18s ease;
}
.chipDepth:hover{
  transform: translateY(-1px);
  background: rgba(96,165,250,.12);
}

.pBody{
  border:1px solid rgba(148,163,184,.10);
  border-radius:14px;
  background:rgba(17,24,39,.20);
  overflow:hidden;
}
.pItem{
  position: relative;
  padding:12px 4px;
  border-bottom:1px solid rgba(255,255,255,.05);
  cursor:pointer;
  transition: background .18s ease, transform .12s ease;
}
.pItem:last-child{ border-bottom:none; }
.pItem:hover{ background:rgba(255,255,255,.035); transform: translateX(2px); }
.pItemTop{ display:flex; gap:10px; align-items:center; justify-content:space-between; }
.pItemName{font-size:14px;font-weight:700;font-family:var(--f-display);letter-spacing:.05px;line-height:1.2;}
.pItemName .small{ opacity:.70; font-weight:650; }
.pItemMeta{ margin-top:4px; font-size:12.5px; opacity:.72; line-height:1.35; }
.pRight{ font-variant-numeric:tabular-nums; font-weight:800; font-size:12px; white-space:nowrap; opacity:.90; }

.pSearchRow{ display:flex; gap:8px; align-items:center; margin-top:10px; }
.pSearchRow input[type="text"]{ flex:1; }
.bList{
  margin-top:10px;
  border:1px solid rgba(148,163,184,.12);
  border-radius:14px;
  overflow:hidden;
  background:rgba(17,24,39,.20);
  max-height:70vh;
  overflow:auto;
}

/* Tree transitions */
.node .rect, .edge{
  transition: opacity .18s ease, stroke-width .18s ease, filter .18s ease;
}
.edge{ stroke-opacity:.55; stroke-linecap:round; }
.tName{ font-weight:900; letter-spacing:.1px; }
.tMeta{ opacity:.85; }

.node.isFocus .rect{
  stroke-width:3.25;
  filter: drop-shadow(0 8px 14px rgba(0,0,0,.35)) brightness(1.03);
}
.node.isDim .rect{ opacity:.72; filter:saturate(.92) brightness(.98); }
.node.isDim .tName{ opacity:.92; }
.node.isDim .tMeta{ opacity:.78; }
.edge.isDim{ stroke-opacity:.22; }
.edge.isFocus{ stroke-opacity:.95; stroke-width:2.4; }


/* ── COI system — elegant jewel tones ── */
.bStat{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:8px 16px;
  border-radius:12px;
  font-size:26px;
  font-weight:800;
  font-family:var(--f-display);
  letter-spacing:-.3px;
  line-height:1;
  border:1px solid;
  backdrop-filter:blur(8px);
  transition:all .25s ease;
}
.bStat span{font-family:var(--f-body);font-size:11px;font-weight:600;opacity:.65;letter-spacing:.5px;text-transform:uppercase;}
.bStat b{font-size:22px;font-weight:800;font-family:var(--f-display);}
.bStat.coiLow {color:var(--coi-low-fg);background:var(--coi-low-bg);border-color:var(--coi-low-border);}
.bStat.coiMid {color:var(--coi-mid-fg);background:var(--coi-mid-bg);border-color:var(--coi-mid-border);}
.bStat.coiHigh{color:var(--coi-high-fg);background:var(--coi-high-bg);border-color:var(--coi-high-border);}

/* inline COI tag pill */
.coiTag{
  font-family:var(--f-body);
  font-style:normal;

<script>
/* ===========================
   HELPERS
=========================== */
function $(id){ return document.getElementById(id); }
function clean(s){ return (s||'').toString().trim().replace(/\s+/g,' '); }
function norm(s){ return clean(s).toLowerCase(); }
function sexNorm(v){ v=clean(v).toUpperCase(); return (v==='M'||v==='F')?v:''; }
function svgEl(tag){ return document.createElementNS('http://www.w3.org/2000/svg',tag); }
function safeId(s){ return String(s||'').replace(/[^a-zA-Z0-9_\-]/g,'_'); }
function ellipsize(s,max){
  s=String(s||'');
  max=Math.max(3,parseInt(max||'0',10)||24);
  if(s.length<=max) return s;
  return s.slice(0,Math.max(0,max-1))+'...';
}
function photosOf(r){
  if(!r) return [];
  if(Array.isArray(r.foto_list)) return r.foto_list.filter(Boolean).slice(0,5);
  if(Array.isArray(r.foto)) return r.foto.filter(Boolean).slice(0,5);
  if(r.foto) return [r.foto];
  return [];
}
function startsWordMatch(rec,q){
  q=norm(q);
  if(!q) return true;
  var hay=norm([rec.name,rec.allevatore,rec.proprietario,rec.paese].filter(Boolean).join(' '));
  var parts=hay.split(/\s+/).filter(Boolean);
  for(var i=0;i<parts.length;i++){ if(parts[i].indexOf(q)===0) return true; }
  return false;
}
function setStatus(msg,cls){
  var el=$('stat');
  if(!el) return;
  el.textContent=msg;
  el.className='status '+(cls||'');
}
window.onerror=function(msg,src,line,col){
  try{ setStatus('JS error: '+msg+' @'+line+':'+col,'bad'); }catch(e){}
  return false;
};

/* ===========================
   STATE
=========================== */
var BUNDLED_DB=[];
var DB=[];
var INDEX=new Map();
var INDEX_READY=false;
var SUBJECT=null;
var MODAL_SUBJECT=null; // tracks subject visible in open modal/profile
var GEN=3;
var VIEW={x:0,y:0,w:1200,h:800};
var lastLayout=null;
var historyBack=[];
var historyFwd=[];
var kidsIndex=new Map();
var BREEDERS=[];
var BREEDER_LAST_QUERY='';
var BREEDER_LAST_SORT='litters';
var PAN_MOVED=false;

/* ===========================
   MODAL STACK
=========================== */
var MODAL_STACK=[];
function resetModalStack(){ MODAL_STACK=[]; }

/* ── Return context: remembers what to reopen after tree navigation ── */
var RETURN_CONTEXT=null;

function setReturnContext(ctx){
  RETURN_CONTEXT=ctx;
  var btn=$('btnReturn'), sep=$('sepReturn'), lbl=$('btnReturnLabel');
  if(btn){
    if(ctx){
      btn.style.display='inline-flex';
      if(sep) sep.style.display='inline-block';
      if(lbl) lbl.textContent=ctx.label||'Torna';
    } else {
      btn.style.display='none';
      if(sep) sep.style.display='none';
    }
  }
}

function clearReturnContext(){
  setReturnContext(null);
}

function executeReturn(){
  if(!RETURN_CONTEXT) return;
  var ctx=RETURN_CONTEXT;
  clearReturnContext();
  if(ctx.type==='coiExplain'&&ctx.subjectId){
    var r=INDEX.get(ctx.subjectId);
    if(r){ render(r,false); setTimeout(function(){ $('btnExplainCOI').click(); },80); }
  } else if(ctx.type==='modal'&&ctx.html){
    resetModalStack();
    pushModalView(ctx.title,ctx.html,ctx.showDir,ctx.onAfterRender||null);
    $('modal').style.display='flex';
  }
}

function modalRender(title,html,showDirBtn,onAfterRender){
  $('modalTitle').textContent=title||'--';
  $('modalImg').style.display='none';
  $('modalImg').removeAttribute('src');
  $('profileBox').innerHTML=html||'';
  $('profileBox').style.display='block';
  $('profileScroll').style.display='block';
  $('modal').style.display='flex';
  if($('modalDir')){
    $('modalDir').style.display=showDirBtn?'inline-flex':'none';
    if(showDirBtn) $('modalDir').textContent=(title&&title.indexOf('COI')!==-1&&title.indexOf('Trend')===-1)?'Chiudi':'← Directory';
  }
  if($('ddList')) $('ddList').style.display='none';
  if($('modalPrint')){

/* ===========================
   INDEX
=========================== */
function rebuildIndex(){
  INDEX=new Map();
  for(var i=0;i<DB.length;i++){ var r=DB[i]; if(r&&r.id) INDEX.set(r.id,r); }
}
function buildKidsIndex(){
  kidsIndex=new Map();
  for(var i=0;i<DB.length;i++){
    var ch=DB[i];
    if(!ch||!ch.id) continue;
    var sireId=ch.padre?String(ch.padre):'';
    var damId=ch.madre?String(ch.madre):'';
    if(sireId){
      if(!kidsIndex.has(sireId)) kidsIndex.set(sireId,new Map());
      var ms=kidsIndex.get(sireId);
      var mate=damId||'__UNK_MATE__';
      if(!ms.has(mate)) ms.set(mate,[]);
      ms.get(mate).push(ch);
    }
    if(damId){
      if(!kidsIndex.has(damId)) kidsIndex.set(damId,new Map());
      var md=kidsIndex.get(damId);
      var mate2=sireId||'__UNK_MATE__';
      if(!md.has(mate2)) md.set(mate2,[]);
      md.get(mate2).push(ch);
    }
  }
  kidsIndex.forEach(function(m){
    m.forEach(function(list){
      list.sort(function(a,b){
        return String(a.birth||'').localeCompare(String(b.birth||''))||
               String(a.name||'').localeCompare(String(b.name||''),'it');
      });
    });
  });
}
function buildBreederIndex(){
  BREEDERS=[];
  var map=new Map();
  for(var i=0;i<DB.length;i++){
    var r=DB[i];
    if(!r||!r.id) continue;
    var b=clean(r.allevatore||'');
    if(!b) continue;
    if(!map.has(b)) map.set(b,[]);
    map.get(b).push(r);
  }
  function litterKey(r){
    return (clean(r.padre||'')||'__NO_SIRE__')+'|'+(clean(r.madre||'')||'__NO_DAM__')+'|'+(clean(r.birth||'')||'__NO_BIRTH__');
  }
  map.forEach(function(rows,breeder){
    var total=rows.length,m=0,f=0,u=0,minY=9999,maxY=0;
    var byCountry=new Map();
    for(var i=0;i<rows.length;i++){
      var r=rows[i];
      var sx=String(r.sesso||'').toUpperCase();
      if(sx==='M') m++; else if(sx==='F') f++; else u++;
      if(r.birth&&String(r.birth).length>=4){
        var yy=parseInt(String(r.birth).slice(0,4),10);
        if(!isNaN(yy)){ if(yy<minY) minY=yy; if(yy>maxY) maxY=yy; }
      }
      var c=clean(r.paese||'');
      if(c) byCountry.set(c,(byCountry.get(c)||0)+1);
    }
    var years=(maxY>0)?(minY===9999?String(maxY):(minY+'-'+maxY)):'--';
    var countriesTop=Array.from(byCountry.entries())
      .sort(function(a,b){ return b[1]-a[1]||String(a[0]).localeCompare(String(b[0]),'it'); })
      .slice(0,4).map(function(it){ return it[0]+' ('+it[1]+')'; }).join(' / ')||'--';
    var litMap=new Map();
    for(var i=0;i<rows.length;i++){
      var pup=rows[i],key=litterKey(pup);
      if(!litMap.has(key)) litMap.set(key,{sireId:clean(pup.padre||''),damId:clean(pup.madre||''),birth:clean(pup.birth||''),pups:[]});
      litMap.get(key).pups.push(pup);
    }
    var litters=Array.from(litMap.values()).sort(function(a,b){
      return String(b.birth||'').localeCompare(String(a.birth||''))||(b.pups.length-a.pups.length);
    });
    BREEDERS.push({name:breeder,total:total,m:m,f:f,u:u,years:years,countriesTop:countriesTop,litters:litters,dogs:rows.slice()});
  });
  BREEDERS.sort(function(a,b){ return String(a.name).localeCompare(String(b.name),'it'); });
}

/* ===========================
   TREE
=========================== */
function makeUnknownRec(sex,childId,gen,slot){
  return {id:'__UNK__'+sex+'__'+String(childId||'')+'__g'+gen+'__s'+slot,name:'UNKNOWN',sesso:sex,allevatore:'',proprietario:'',paese:'',tipo:'',pedigree:'',birth:'',note:''};
}
function isUnknownRec(r){ return !!(r&&r.id&&String(r.id).indexOf('__UNK__')===0); }

function buildTree(root,genMax){
  var nodes=[],edges=[];
  var q=[{rec:root,gen:0,slot:0}];
  var seen=new Set();
  while(q.length){
    var cur=q.shift();
    var key=cur.gen+'|'+cur.slot;
    if(seen.has(key)) continue;
    seen.add(key);
    nodes.push({rec:cur.rec,gen:cur.gen,slot:cur.slot,key:key});
    if(cur.gen>=genMax||isUnknownRec(cur.rec)) continue;
    var ss=cur.slot*2,ds=cur.slot*2+1;
    var sire=(cur.rec&&cur.rec.padre)?INDEX.get(cur.rec.padre):null;
    var dam=(cur.rec&&cur.rec.madre)?INDEX.get(cur.rec.madre):null;
    if(!sire) sire=makeUnknownRec('M',cur.rec?cur.rec.id:'',cur.gen+1,ss);
    if(!dam)  dam=makeUnknownRec('F',cur.rec?cur.rec.id:'',cur.gen+1,ds);
    edges.push({from:key,to:(cur.gen+1)+'|'+ss});
    edges.push({from:key,to:(cur.gen+1)+'|'+ds});
    q.push({rec:sire,gen:cur.gen+1,slot:ss});
    q.push({rec:dam,gen:cur.gen+1,slot:ds});
  }
  return {nodes:nodes,edges:edges,genMax:genMax};
}

/* ===========================
   LAYOUT
=========================== */
function layoutTree(tree){
  var nodeW=(tree.genMax>=5)?270:(tree.genMax>=4?280:300);
  var nodeH=(tree.genMax>=5)?78:(tree.genMax>=4?84:96);
  var gapY=(tree.genMax>=5)?8:(tree.genMax>=4?10:18);
  var stepY=nodeH+gapY;
  var svgElem=$('svg');
  var rect=svgElem?svgElem.getBoundingClientRect():null;
  var availW=rect?rect.width:(window.innerWidth||1200);
  var minColW=(tree.genMax>=5)?560:(tree.genMax>=4?350:360);
  var colW=Math.max(minColW,Math.floor((availW-nodeW)/Math.max(1,tree.genMax)));

  var byGen=new Map();
  for(var i=0;i<tree.nodes.length;i++){
    var n=tree.nodes[i];
    if(!byGen.has(n.gen)) byGen.set(n.gen,[]);
    byGen.get(n.gen).push(n);
  }
  byGen.forEach(function(arr){ arr.sort(function(a,b){ return a.slot-b.slot; }); });

  var yMap=new Map();
  function leafMid(gen,slot){
    var span=Math.pow(2,tree.genMax-gen);
    return ((slot*span)+((slot*span+span-1)))/2*stepY;
  }
  for(var i=0;i<tree.nodes.length;i++){
    var n=tree.nodes[i];
    yMap.set(n.key,leafMid(n.gen,n.slot));
  }

  function minDy(n){ return isUnknownRec(n?n.rec:null)?(nodeH*0.92+gapY):(nodeH+gapY); }

  for(var pass=0;pass<4;pass++){
    for(var g=0;g<=tree.genMax;g++){
      var row=(byGen.get(g)||[]).slice().sort(function(a,b){ return a.slot-b.slot; });
      var last=null;
      for(var i=0;i<row.length;i++){
        var n=row[i];
        if(!last){ last=n; continue; }
        var prevY=yMap.get(last.key)||0;
        var need=Math.max(minDy(n),minDy(last));
        if((yMap.get(n.key)||0)<prevY+need) yMap.set(n.key,prevY+need);
        last=n;
      }
    }
    for(var g2=0;g2<tree.genMax;g2++){
      var row2=byGen.get(g2)||[];
      for(var j=0;j<row2.length;j++){
        var n2=row2[j];
        var sk=(g2+1)+'|'+(n2.slot*2);
        var dk=(g2+1)+'|'+(n2.slot*2+1);
        if(!yMap.has(sk)||!yMap.has(dk)) continue;
        var ys=yMap.get(sk)||0,yd=yMap.get(dk)||0;
        if(ys>yd+0.0001){ yMap.set(sk,yd); yMap.set(dk,ys); }
      }
    }
  }

  var positions=new Map();
  var minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  for(var i=0;i<tree.nodes.length;i++){
    var n=tree.nodes[i];
    var x=n.gen*colW,y=yMap.get(n.key)||0;
    positions.set(n.key,{x:x,y:y,w:nodeW,h:nodeH});
    minX=Math.min(minX,x); minY=Math.min(minY,y);
    maxX=Math.max(maxX,x+nodeW); maxY=Math.max(maxY,y+nodeH);
  }
  if(isFinite(minY)&&minY!==0){ positions.forEach(function(p){ p.y-=minY; }); maxY-=minY; minY=0; }
  if(isFinite(minX)&&minX!==0){ positions.forEach(function(p){ p.x-=minX; }); maxX-=minX; minX=0; }

  var bbox={x:minX,y:minY,w:maxX-minX,h:maxY-minY};
  var targetW=(tree.genMax*colW)+nodeW;
  if(targetW<bbox.w) targetW=bbox.w;
  var extraX=availW-targetW;
  if(extraX>0){ positions.forEach(function(p){ p.x+=extraX/2; }); }
  bbox.w=targetW;
  return {positions:positions,bbox:bbox,nodeW:nodeW,nodeH:nodeH};
}

/* ===========================
   REPEATS
=========================== */
function computeRepeats(subjectId){
  var count=new Map(),visits=0;
  function walk(id,depth){
    if(depth<0||visits++>40000) return;
    id=String(id||'');
    if(!id||id.indexOf('__UNK__')===0) return;
    count.set(id,(count.get(id)||0)+1);
    var r=INDEX.get(id);
    if(!r) return;
    if(r.padre) walk(r.padre,depth-1);
    if(r.madre) walk(r.madre,depth-1);
  }
  walk(subjectId,25);
  return {count:count};
}

function roleClass(r,gen,slot){
  if(gen===0) return 'subject';
  return slot%2===0?'sire':'dam';
}

/* ===========================
   VIEW / PAN / ZOOM
=========================== */
function applyView(){
  $('svg').setAttribute('viewBox',VIEW.x+' '+VIEW.y+' '+VIEW.w+' '+VIEW.h);
}
function fitToBBox(b){
  var padX=GEN>=5?Math.max(2,b.w*0.008):Math.max(12,b.w*0.04);
  var padY=Math.max(12,b.h*0.05);
  VIEW={x:b.x-padX,y:b.y-padY,w:b.w+padX*2,h:b.h+padY*2};
  applyView();
}
function zoomAt(factor){
  var cx=VIEW.x+VIEW.w/2,cy=VIEW.y+VIEW.h/2;
  VIEW={x:cx-(VIEW.w/factor)/2,y:cy-(VIEW.h/factor)/2,w:VIEW.w/factor,h:VIEW.h/factor};
  applyView();
}
function zoomAtPoint(factor,cx,cy){
  var svg=$('svg');
  if(!svg) return;
  var r=svg.getBoundingClientRect();
  var rx=(cx-r.left)/Math.max(1,r.width),ry=(cy-r.top)/Math.max(1,r.height);
  var px=VIEW.x+rx*VIEW.w,py=VIEW.y+ry*VIEW.h;
  var nw=VIEW.w/factor,nh=VIEW.h/factor;
  VIEW={x:px-rx*nw,y:py-ry*nh,w:nw,h:nh};
  applyView();
}
function attachPan(svg){
  var dragging=false,last={x:0,y:0},start={x:0,y:0};
  function cp(ev){ return ev.touches&&ev.touches.length?{x:ev.touches[0].clientX,y:ev.touches[0].clientY}:{x:ev.clientX,y:ev.clientY}; }
  function onDown(ev){
    var t=ev.target;
    while(t&&t!==svg){ if(t.classList&&t.classList.contains('node')) return; t=t.parentNode; }
    if(ev.touches&&ev.touches.length===2) return;
    dragging=true; PAN_MOVED=false; last=cp(ev); start={x:last.x,y:last.y};
    if(ev.cancelable) ev.preventDefault();
  }
  function onMove(ev){
    if(!dragging) return;
    var p=cp(ev),dx=p.x-last.x,dy=p.y-last.y;
    last=p;
    if(Math.abs(p.x-start.x)+Math.abs(p.y-start.y)>6) PAN_MOVED=true;
    if(PAN_MOVED){
      var r=svg.getBoundingClientRect();
      VIEW.x-=dx*(VIEW.w/Math.max(1,r.width));
      VIEW.y-=dy*(VIEW.h/Math.max(1,r.height));
      applyView();
    }
    if(ev.cancelable) ev.preventDefault();
  }
  function onUp(){ dragging=false; }
  svg.addEventListener('mousedown',onDown);
  svg.addEventListener('mousemove',onMove);
  window.addEventListener('mouseup',onUp);
  svg.addEventListener('touchstart',onDown,{passive:false});
  svg.addEventListener('touchmove',onMove,{passive:false});
  window.addEventListener('touchend',onUp);
}
function attachWheelZoom(svg){
  if(!svg) return;
  svg.addEventListener('wheel',function(ev){
    ev.preventDefault();
    var dy=ev.deltaY*(ev.deltaMode===1?18:ev.deltaMode===2?300:1);
    zoomAtPoint(Math.max(0.75,Math.min(1.35,Math.exp(-dy*0.0012))),ev.clientX,ev.clientY);
  },{passive:false});
}
function attachPinchZoom(svg){
  if(!svg) return;
  var pinching=false,sd=0,sv=null,sm=null;
  function dist(a,b){ var dx=b.clientX-a.clientX,dy=b.clientY-a.clientY; return Math.sqrt(dx*dx+dy*dy); }
  function mid(a,b){ return {x:(a.clientX+b.clientX)/2,y:(a.clientY+b.clientY)/2}; }
  svg.addEventListener('touchstart',function(ev){
    if(ev.touches&&ev.touches.length===2){
      pinching=true; sd=dist(ev.touches[0],ev.touches[1]);
      sv={x:VIEW.x,y:VIEW.y,w:VIEW.w,h:VIEW.h}; sm=mid(ev.touches[0],ev.touches[1]);
      ev.preventDefault();
    }
  },{passive:false});
  svg.addEventListener('touchmove',function(ev){
    if(!pinching||!ev.touches||ev.touches.length!==2||sd<=0) return;
    VIEW={x:sv.x,y:sv.y,w:sv.w,h:sv.h};
    zoomAtPoint(Math.max(0.5,Math.min(2.0,dist(ev.touches[0],ev.touches[1])/sd)),sm.x,sm.y);
    ev.preventDefault();
  },{passive:false});
  svg.addEventListener('touchend',function(ev){
    if(ev.touches&&ev.touches.length<2){ pinching=false; sv=null; sm=null; sd=0; }
  },{passive:true});
}

/* ===========================
   RENDER SVG
=========================== */
function render(root,pushHistory){
  var svg=$('svg');
  svg.innerHTML='';
  if(!root){ setStatus('Apri un JSON e seleziona un cane.','warn'); setEnabled(false); return; }
  if(pushHistory){
    if(SUBJECT&&SUBJECT.id&&SUBJECT.id!==root.id){ historyBack.push(SUBJECT.id); historyFwd=[]; }
    updateHistoryButtons();
  }
  SUBJECT=root;
  if($('btnEditor')) $('btnEditor').href='./editor-database-alabay-club-italia-fixed.html#'+encodeURIComponent(root.id);

  var rep=computeRepeats(root.id);
  var tree=buildTree(root,GEN);
  var lay=layoutTree(tree);
  lastLayout=lay;

  var defs=svgEl('defs');
  svg.appendChild(defs);

  // -- GRADIENT DEFS ----------------------------------------
  function addGrad(id,c1,c2,vertical){
    var g=svgEl('linearGradient');
    g.setAttribute('id',id);
    g.setAttribute('x1','0'); g.setAttribute('y1','0');
    g.setAttribute('x2',vertical?'0':'0'); g.setAttribute('y2',vertical?'1':'0');
    var s1=svgEl('stop'); s1.setAttribute('offset','0%'); s1.setAttribute('stop-color',c1);
    var s2=svgEl('stop'); s2.setAttribute('offset','100%'); s2.setAttribute('stop-color',c2);
    g.appendChild(s1); g.appendChild(s2); defs.appendChild(g);
  }
  // subject gradient (gen 0)
  addGrad('gSubject','#0f2040','#071628',true);
  // sire gradient
  addGrad('gSire','#091830','#060f20',true);
  // dam gradient
  addGrad('gDam','#1a0820','#100515',true);
  // neutral
  addGrad('gNeutral','#0d1528','#080e1c',true);

  // -- EDGES (orthogonal elbow style) ------------------------
  var gE=svgEl('g');
  gE.setAttribute('class','edgeGroup');
  for(var i=0;i<tree.edges.length;i++){
    var e=tree.edges[i];
    var a=lay.positions.get(e.from),b=lay.positions.get(e.to);
    if(!a||!b) continue;
    var x1=a.x+a.w, y1=a.y+a.h/2;
    var x2=b.x,     y2=b.y+b.h/2;
    var midX=x1+Math.round((x2-x1)*0.42);
    // Orthogonal elbow: horizontal from node - elbow - vertical - horizontal to next
    var d='M '+x1+' '+y1+' L '+midX+' '+y1+' L '+midX+' '+y2+' L '+x2+' '+y2;
    var p=svgEl('path');
    p.setAttribute('d',d);
    var isFocus=(e.from==='0|0');
    p.setAttribute('class','edge '+(isFocus?'isFocus':'isDim'));
    gE.appendChild(p);
  }
  svg.appendChild(gE);

  // -- NODES -------------------------------------------------
  var gNodes=svgEl('g');
  for(var i=0;i<tree.nodes.length;i++){
    var n=tree.nodes[i];
    var pos=lay.positions.get(n.key);
    if(!pos) continue;
    var r=n.rec, isUnk=isUnknownRec(r);
    var rid=(r&&r.id)?String(r.id):'';
    var repN=(!isUnk&&rep)?((rep.count.get(rid)||0)):0;
    var isSubject=(n.gen===0);
    var sx=r&&r.sesso?String(r.sesso).toUpperCase():'';
    var isSire=(n.gen>0&&n.slot%2===0);
    var isDam =(n.gen>0&&n.slot%2===1);

    // repeat class
    var repCls='';
    if(repN>=4)      repCls=' repeatHigh';
    else if(repN>=3) repCls=' repeatMid';
    else if(repN>=2) repCls=' repeat';

    var g=svgEl('g');
    var cls='node '+(isUnk?'unknown':(isSubject?'subject':(isSire?'sire':'dam')))+repCls;
    g.setAttribute('class',cls);
    g.setAttribute('data-gen',String(n.gen||0));
    if(!isUnk&&SUBJECT&&rid===String(SUBJECT.id||'')) g.classList.add('isFocus');
    else g.classList.add('isDim');
    g.setAttribute('transform','translate('+pos.x+','+pos.y+')');

    var W=pos.w, H=pos.h;

    // -- background rect ----------------------------------
    var rect=svgEl('rect');
    rect.setAttribute('class','rect');
    rect.setAttribute('rx','10'); rect.setAttribute('ry','10');
    rect.setAttribute('width',W); rect.setAttribute('height',H);
    // use gradient fill for non-unknown nodes
    if(!isUnk){
      var gfill=isSubject?'url(#gSubject)':isSire?'url(#gSire)':isDam?'url(#gDam)':'url(#gNeutral)';
      rect.setAttribute('fill',gfill);
    }
    g.appendChild(rect);

    // -- accent bar (left edge colored stripe) ------------
    if(!isUnk&&!isSubject){
      var barW=3, barH=H-16, barX=0, barY=8;
      var bar=svgEl('rect');
      bar.setAttribute('class','sideBar');
      bar.setAttribute('x',barX); bar.setAttribute('y',barY);
      bar.setAttribute('width',barW); bar.setAttribute('height',barH);
      bar.setAttribute('rx','1.5'); bar.setAttribute('ry','1.5');
      bar.setAttribute('fill',isSire?'rgba(71,120,210,.75)':'rgba(168,65,130,.75)');
      g.appendChild(bar);
    }

    // -- UNKNOWN node -------------------------------------
    if(isUnk){
      var tu=svgEl('text');
      tu.setAttribute('x',W/2); tu.setAttribute('y',H/2+5);
      tu.setAttribute('text-anchor','middle');
      tu.setAttribute('class','tUnk');
      tu.textContent='UNKNOWN';
      g.appendChild(tu);
      gNodes.appendChild(g);
      continue;
    }

    // -- SEX PILL -----------------------------------------
    if(sx==='M'||sx==='F'){
      var pw=22,ph=14,prx=7;
      var pillX=W-pw-9, pillY=8;
      var pill=svgEl('rect');
      pill.setAttribute('x',pillX); pill.setAttribute('y',pillY);
      pill.setAttribute('width',pw); pill.setAttribute('height',ph);
      pill.setAttribute('rx',prx); pill.setAttribute('ry',prx);
      pill.setAttribute('class',sx==='M'?'pillM':'pillF');
      g.appendChild(pill);
      var pt=svgEl('text');
      pt.setAttribute('x',pillX+pw/2); pt.setAttribute('y',pillY+10);
      pt.setAttribute('text-anchor','middle'); pt.setAttribute('class','pillText');
      pt.textContent=sx; g.appendChild(pt);
    }

    // -- REPEAT BADGE -------------------------------------
    if(repN>=2){
      var bw=28,bh=16,bx2=W-bw-9,by2=H-bh-7;
      var badgeCls=repN>=4?'repBadge repBadgeHigh':repN>=3?'repBadge repBadgeMid':'repBadge';
      var br=svgEl('rect');
      br.setAttribute('x',bx2); br.setAttribute('y',by2);
      br.setAttribute('width',bw); br.setAttribute('height',bh);
      br.setAttribute('rx',8); br.setAttribute('ry',8);
      br.setAttribute('class',badgeCls);
      g.appendChild(br);
      var bt=svgEl('text');
      bt.setAttribute('x',bx2+bw/2); bt.setAttribute('y',by2+11);
      bt.setAttribute('text-anchor','middle'); bt.setAttribute('class','repBadgeText');
      bt.textContent='x'+repN; g.appendChild(bt);
    }

    // -- PHOTO THUMB --------------------------------------
    var fotos=photosOf(r), hasPhoto=fotos.length>0;
    var thumbSize=isSubject?48:36;
    var thumbX=isSubject?12:10, thumbY=isSubject?14:12, thumbR=8;
    var textX=hasPhoto?(thumbX+thumbSize+10):(isSubject?14:10);
    var leftPad=hasPhoto?textX:10;

    if(hasPhoto){
      var clipId='clip_'+safeId(r.id)+'_'+n.gen+'_'+n.slot;
      var clip=svgEl('clipPath'); clip.setAttribute('id',clipId);
      var cr=svgEl('rect');
      cr.setAttribute('x',thumbX); cr.setAttribute('y',thumbY);
      cr.setAttribute('width',thumbSize); cr.setAttribute('height',thumbSize);
      cr.setAttribute('rx',thumbR); cr.setAttribute('ry',thumbR);
      clip.appendChild(cr); defs.appendChild(clip);
      var img=svgEl('image');
      img.setAttribute('x',thumbX); img.setAttribute('y',thumbY);
      img.setAttribute('width',thumbSize); img.setAttribute('height',thumbSize);
      img.setAttribute('preserveAspectRatio','xMidYMid slice');
      img.setAttribute('clip-path','url(#'+clipId+')');
      img.setAttribute('href',fotos[0]);
      img.setAttributeNS('http://www.w3.org/1999/xlink','xlink:href',fotos[0]);
      g.appendChild(img);
      var bb=svgEl('rect');
      bb.setAttribute('x',thumbX); bb.setAttribute('y',thumbY);
      bb.setAttribute('width',thumbSize); bb.setAttribute('height',thumbSize);
      bb.setAttribute('rx',thumbR); bb.setAttribute('ry',thumbR);
      bb.setAttribute('fill','none'); bb.setAttribute('class','thumbBorder');
      g.appendChild(bb);
      var hit=svgEl('rect');
      hit.setAttribute('x',thumbX); hit.setAttribute('y',thumbY);
      hit.setAttribute('width',thumbSize); hit.setAttribute('height',thumbSize);
      hit.setAttribute('rx',thumbR); hit.setAttribute('ry',thumbR);
      hit.setAttribute('fill','transparent');
      g.appendChild(hit);
      (function(rec2,unk2){
        function openFoto(ev){ ev.stopPropagation(); if(!unk2) openProfile(rec2); }
        img.addEventListener('click',openFoto);
        bb.addEventListener('click',openFoto);
        hit.addEventListener('click',openFoto);
      })(r,isUnk);
    }

    // -- TEXT BLOCK ---------------------------------------
    var nameMaxLen=isSubject?28:22;
    var t1=svgEl('text');
    t1.setAttribute('x',leftPad);
    t1.setAttribute('y',isSubject?'42':'34');
    t1.setAttribute('class',isSubject?'tName isSubject':'tName');
    t1.textContent=ellipsize(r.name||'(Senza nome)',nameMaxLen);
    g.appendChild(t1);

    // breeder / owner line
    var line1=[];
    if(r.allevatore) line1.push('All. '+r.allevatore);
    if(!r.allevatore&&r.proprietario) line1.push('Propr. '+r.proprietario);
    if(line1.length){
      var t2=svgEl('text');
      t2.setAttribute('x',leftPad);
      t2.setAttribute('y',isSubject?'60':'49');
      t2.setAttribute('class','tMeta');
      t2.textContent=ellipsize(line1[0],isSubject?34:28);
      g.appendChild(t2);
    }

    // year + country line
    var year2=r.birth&&String(r.birth).length>=4?String(r.birth).slice(0,4):'';
    var meta3parts=[];
    if(r.paese) meta3parts.push(r.paese);
    if(year2)   meta3parts.push(year2);
    if(meta3parts.length){
      var t3=svgEl('text');
      t3.setAttribute('x',leftPad);
      t3.setAttribute('y',isSubject?'76':'62');
      t3.setAttribute('class','tYear');
      t3.textContent=meta3parts.join(' / ');
      g.appendChild(t3);
    }

    // pedigree number (small, bottom-left) - only for non-subject
    if(!isSubject&&r.pedigree){
      var tp=svgEl('text');
      tp.setAttribute('x',leftPad);
      tp.setAttribute('y',String(H-8));
      tp.setAttribute('class','tYear');
      tp.setAttribute('font-size','9.5');
      tp.setAttribute('opacity','.45');
      tp.textContent=ellipsize(r.pedigree,20);
      g.appendChild(tp);
    }

    // -- click handler -------------------------------------
    (function(rec2,gEl){
      gEl.addEventListener('click',function(ev){ ev.stopPropagation(); selectSubject(rec2,true); });
      gEl.addEventListener('touchend',function(ev){ ev.stopPropagation(); ev.preventDefault(); selectSubject(rec2,true); },{passive:false});
    })(r,g);

    gNodes.appendChild(g);
  }
  svg.appendChild(gNodes);

  fitToBBox(lay.bbox);
  /* stagger-animate nodes by generation depth */
  (function(){
    var allNodes=Array.prototype.slice.call(svg.querySelectorAll('g.node'));
    allNodes.forEach(function(g){ g.setAttribute('opacity','0'); });
    allNodes.forEach(function(g){
      var gen=parseInt(g.getAttribute('data-gen')||'0',10)||0;
      var delay=gen*60;
      setTimeout(function(){
        g.removeAttribute('opacity');
        g.style.transition='opacity .3s ease';
        g.setAttribute('opacity','1');
      }, delay);
    });
  })();
  renderSidebar(root);
  setStatus('Selezionato: '+(root.name||root.id)+' / Gen: '+GEN,'ok');
  setEnabled(true);
}

/* -- LIGHTBOX STATE -- */
var LB_PHOTOS=[]; /* current photo list */
var LB_IDX=0;    /* current index */
var LB_SWIPE_X=null;

function lbShow(photos, startIdx){
  LB_PHOTOS=photos||[];
  LB_IDX=Math.max(0,Math.min(startIdx||0,LB_PHOTOS.length-1));
  $('modalTitle').textContent='Foto';
  $('profileScroll').style.display='none';
  $('profileBox').style.display='none';
  $('lightboxWrap').style.display='block';
  $('modal').style.display='flex';
  if($('modalPrint')) $('modalPrint').style.display='none';
  lbUpdate();
}

function lbUpdate(){
  if(!LB_PHOTOS.length) return;
  var url=LB_PHOTOS[LB_IDX];
  $('modalImg').src=url;
  var n=LB_PHOTOS.length;
  $('lbCounter').textContent=(n>1)?(LB_IDX+1)+' / '+n:'';
  $('lbPrev').disabled=(LB_IDX===0);
  $('lbNext').disabled=(LB_IDX===n-1);
  $('lbPrev').style.display=(n>1)?'flex':'none';
  $('lbNext').style.display=(n>1)?'flex':'none';
}

function lbPrev(){ if(LB_IDX>0){ LB_IDX--; lbUpdate(); } }
function lbNext(){ if(LB_IDX<LB_PHOTOS.length-1){ LB_IDX++; lbUpdate(); } }

function openPhoto(url, allPhotos){
  var photos=allPhotos||[url];
  var idx=photos.indexOf(url);
  if(idx<0) idx=0;
  lbShow(photos, idx);
}

/* keyboard nav */
document.addEventListener('keydown', function(ev){
  if($('modal').style.display==='none') return;
  if($('lightboxWrap').style.display==='none') return;
  if(ev.key==='ArrowLeft'||ev.key==='ArrowUp')   { ev.preventDefault(); lbPrev(); }
  if(ev.key==='ArrowRight'||ev.key==='ArrowDown') { ev.preventDefault(); lbNext(); }
  if(ev.key==='Escape') { $('modal').style.display='none'; }
});

/* touch swipe */
$('lightboxWrap').addEventListener('touchstart',function(ev){
  LB_SWIPE_X=ev.touches[0].clientX;
},{passive:true});
$('lightboxWrap').addEventListener('touchend',function(ev){
  if(LB_SWIPE_X===null) return;
  var dx=ev.changedTouches[0].clientX - LB_SWIPE_X;
  if(Math.abs(dx)>40){ if(dx<0) lbNext(); else lbPrev(); }
  LB_SWIPE_X=null;
},{passive:true});

/* arrow buttons */
$('lbPrev').onclick=function(ev){ ev.stopPropagation(); lbPrev(); };
$('lbNext').onclick=function(ev){ ev.stopPropagation(); lbNext(); };

function renderKids(root){

  var groups=[];
  m.forEach(function(list,mateId){ groups.push({mateId:mateId,kids:list}); });
  groups.sort(function(a,b){
    var ra=INDEX.get(a.mateId),rb=INDEX.get(b.mateId);

  });
  for(var i=0;i<groups.length;i++){

      (function(ch){
        var row=document.createElement('div');

        var tagCls=sx==='M'?'sexTag sexM':sx==='F'?'sexTag sexF':'sexTag sexU';
        row.innerHTML='<div class="childLeft">'+
          '<div class="childName"><span class="'+tagCls+'">'+(sx||'?')+'</span>'+clean(ch.name||'(Senza nome)')+' <span class="small">['+ch.id+']</span></div>'+

function openBreedersDirectory(){
  var html='<div class="pModal">';
  html+='<div class="pHead">';
  html+='<div class="pHeadTop"><div><div class="pTitle">Allevatori</div><div class="pSub">Directory allevatori nel database.</div></div>';
  html+='<div class="pRight"><b>'+(BREEDERS?BREEDERS.length:0)+'</b> allevatori</div></div>';
  html+='<div class="pSearchRow"><input id="bq" type="text" placeholder="Cerca allevatore..." autocomplete="off"></div>';
  html+='<div class="pChips"><div class="chip" id="chip_sort_litters">Cucciolate</div><div class="chip" id="chip_sort_dogs">Cani</div><div class="chip" id="chip_sort_name">Nome</div></div>';
  html+='</div>';
  html+='<div class="pBody"><div id="bList" class="bList"></div></div>';
  html+='</div>';
  resetModalStack();
  pushModalView('Allevatori',html,false,function(){
    var inp=document.getElementById('bq');
    var chip1=document.getElementById('chip_sort_litters');
    var chip2=document.getElementById('chip_sort_dogs');
    var chip3=document.getElementById('chip_sort_name');
    var SORT='litters';
    function setChip(w){ if(chip1) chip1.classList.toggle('active',w==='litters'); if(chip2) chip2.classList.toggle('active',w==='dogs'); if(chip3) chip3.classList.toggle('active',w==='name'); }
    function renderList(q){
      BREEDER_LAST_QUERY=(q==='__EMPTY__')?'':clean(q||'');
      BREEDER_LAST_SORT=SORT;
      var box=document.getElementById('bList');
      if(!box) return;
      if(q==='__EMPTY__'){ box.innerHTML='<div class="pItem"><div class="pItemName">Digita per cercare...</div></div>'; return; }
      box.innerHTML='';
      var qn=norm(q||'');
      var rows=(BREEDERS||[]).slice().filter(function(b){ return b&&b.name&&(!qn||norm(b.name).indexOf(qn)!==-1); });
      rows.sort(function(a,b){
        var la=a.litters?a.litters.length:0,lb=b.litters?b.litters.length:0;
        if(SORT==='litters') return (lb-la)||((b.total||0)-(a.total||0));
        if(SORT==='dogs') return ((b.total||0)-(a.total||0))||(lb-la);
        return String(a.name).localeCompare(String(b.name),'it');
      });
      var shown=0;
      for(var i=0;i<rows.length;i++){
        var b=rows[i];
        var div=document.createElement('div');
        div.className='pItem';
        div.innerHTML='<div class="pItemTop"><div class="pItemName">'+clean(b.name)+'</div><div class="pRight">Cucc: '+(b.litters?b.litters.length:0)+' / Cani: '+(b.total||0)+'</div></div>'+
          '<div class="pItemMeta">Anni: '+clean(b.years||'--')+' / Paesi: '+clean(b.countriesTop||'--')+'</div>';
        (function(name){
          div.addEventListener('click',function(ev){ ev.stopPropagation(); openBreederProfile(name); });
        })(b.name);
        box.appendChild(div);
        if(++shown>=500) break;
      }
      if(shown===0) box.innerHTML='<div class="pItem"><div class="pItemName">Nessun risultato</div></div>';
    }
    setChip(SORT);
    if(chip1) chip1.onclick=function(){ SORT='litters'; setChip(SORT); renderList(inp?inp.value:''); };
    if(chip2) chip2.onclick=function(){ SORT='dogs';    setChip(SORT); renderList(inp?inp.value:''); };
    if(chip3) chip3.onclick=function(){ SORT='name';    setChip(SORT); renderList(inp?inp.value:''); };
    if(inp){
      inp.addEventListener('input',function(){ renderList(inp.value); });
      inp.addEventListener('keydown',function(ev){ if(ev.key==='Escape'){ inp.value=''; renderList('__EMPTY__'); inp.blur(); } });
      setTimeout(function(){ try{ inp.focus(); inp.select(); }catch(e){} },50);
    }
    renderList(BREEDER_LAST_QUERY||'__EMPTY__');
  });
}

function openBreederProfile(breeder){
  breeder=clean(breeder||'');
  if(!breeder){ setStatus('Allevatore non disponibile.','warn'); return; }
  var rows=DB.filter(function(r){ return r&&r.id&&String(r.allevatore||'')===breeder; });
  var total=rows.length,m=0,f=0,u=0,minY=9999,maxY=0;
  var byCountry=new Map();
  var coiBins={low:0,moderate:0,high:0,veryHigh:0};
  var coiCount=0,coiSum=0,coiMin=null,coiMax=null,coiMinRec=null,coiMaxRec=null;

  function binOfPct(p){ return p<5?'low':p<10?'moderate':p<20?'high':'veryHigh'; }

  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    var sx=String(r.sesso||'').toUpperCase();
    if(sx==='M') m++; else if(sx==='F') f++; else u++;
    if(r.birth&&String(r.birth).length>=4){
      var yy=parseInt(String(r.birth).slice(0,4),10);
      if(!isNaN(yy)){ if(yy<minY) minY=yy; if(yy>maxY) maxY=yy; }
    }
    var c=clean(r.paese||'');
    if(c) byCountry.set(c,(byCountry.get(c)||0)+1);
    var Fv=F_of(r.id);
    if(Fv!=null&&isFinite(Fv)&&!isNaN(Fv)){
      var pctv=Fv*100;
      coiBins[binOfPct(pctv)]++;
      coiCount++; coiSum+=pctv;
      if(coiMin==null||pctv<coiMin){ coiMin=pctv; coiMinRec=r; }
      if(coiMax==null||pctv>coiMax){ coiMax=pctv; coiMaxRec=r; }
    }
  }

  var years=(maxY>0)?(minY===9999?String(maxY):(minY+'-'+maxY)):'--';
  var topCountries=Array.from(byCountry.entries())
    .sort(function(a,b){ return b[1]-a[1]; }).slice(0,4)
    .map(function(it){ return it[0]+' ('+it[1]+')'; }).join(' / ')||'--';

  function litterKey(r){ return (clean(r.padre||'')||'__S')+'|'+(clean(r.madre||'')||'__D')+'|'+(clean(r.birth||'')||'__B'); }
  var litMap=new Map();
  for(var i=0;i<rows.length;i++){
    var pup=rows[i],key=litterKey(pup);
    if(!litMap.has(key)) litMap.set(key,{birth:clean(pup.birth||''),padre:clean(pup.padre||''),madre:clean(pup.madre||''),pups:[]});
    litMap.get(key).pups.push(pup);
  }
  var litters=Array.from(litMap.values()).sort(function(a,b){ return String(b.birth||'').localeCompare(String(a.birth||'')); });

  function topFromMap(map,n){
    return Array.from(map.entries()).sort(function(a,b){ return b[1]-a[1]; }).slice(0,n).map(function(it){
      var rec=INDEX.get(it[0]);
      return {id:it[0],name:rec?(rec.name||it[0]):it[0],n:it[1]};
    });
  }
  var sireUse=new Map(),damUse=new Map();
  var sireLitterSets=new Map(), damLitterSets=new Map();
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    var lk=litterKey(r);
    if(r.padre){
      if(!sireLitterSets.has(r.padre)) sireLitterSets.set(r.padre,new Set());
      sireLitterSets.get(r.padre).add(lk);
    }
    if(r.madre){
      if(!damLitterSets.has(r.madre)) damLitterSets.set(r.madre,new Set());
      damLitterSets.get(r.madre).add(lk);
    }
  }
  sireLitterSets.forEach(function(set,id){ sireUse.set(id,set.size); });
  damLitterSets.forEach(function(set,id){ damUse.set(id,set.size); });
  var topSires=topFromMap(sireUse,5);
  var topDams=topFromMap(damUse,5);

  var coiAvg=coiCount?(coiSum/coiCount):null;
  var alertTxt='';
  if(coiAvg!=null){
    if(coiAvg>=20) alertTxt='Media COI molto alta (>=20%).';
    else if(coiAvg>=10) alertTxt='Media COI alta (>=10%).';
    else if(coiAvg>=5) alertTxt='Media COI moderata (>=5%).';
    else alertTxt='Media COI bassa (<5%).';
  }

  function escId(id){ return String(id||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
  function kv(k,v){ return '<div class="k">'+k+'</div><div class="v">'+clean(v||'--')+'</div>'; }
  function linkDog(rec){
    if(!rec||!rec.id) return '';
    return '<span class="bpLink" data-id="'+escId(rec.id)+'">'+clean(rec.name||rec.id)+'</span>';
  }

  /* ── inject CSS once ── */
  if(!document.getElementById('_bpCSS')){
    var s=document.createElement('style'); s.id='_bpCSS';
    s.textContent=[
      /* layout */
      '.bpShell{display:flex;height:100%;min-height:0;font-family:system-ui,-apple-system,sans-serif}',
      '.bpNav{width:160px;flex-shrink:0;border-right:1px solid rgba(148,163,184,.12);padding:10px 0;display:flex;flex-direction:column;gap:2px;background:rgba(11,18,32,.4)}',
      '.bpNavItem{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;border-radius:0;transition:background .14s,color .14s;font-size:12.5px;font-weight:600;color:rgba(148,163,184,.7);border-left:2px solid transparent;user-select:none}',
      '.bpNavItem:hover{background:rgba(148,163,184,.06);color:rgba(229,231,235,.9)}',
      '.bpNavItem.active{background:rgba(96,165,250,.08);color:#93c5fd;border-left-color:#60a5fa}',
      '.bpNavIcon{font-size:15px;width:18px;text-align:center;flex-shrink:0}',
      '.bpNavBadge{margin-left:auto;background:rgba(148,163,184,.15);color:rgba(148,163,184,.8);font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px}',
      '.bpNavItem.active .bpNavBadge{background:rgba(96,165,250,.2);color:#93c5fd}',
      '.bpContent{flex:1;min-width:0;overflow-y:auto;padding:18px 20px}',
      /* header */
      '.bpHeader{padding:16px 20px 12px;border-bottom:1px solid rgba(148,163,184,.1);display:flex;align-items:flex-start;gap:12px;justify-content:space-between;flex-wrap:wrap}',
      '.bpTitle{font-size:20px;font-weight:700;font-family:"Playfair Display",Georgia,serif;letter-spacing:-.1px;color:#edf2ff}',
      '.bpSubtitle{font-size:12px;color:rgba(148,163,184,.6);margin-top:2px}',
      '.bpHeaderStats{display:flex;gap:16px;flex-wrap:wrap}',
      '.bpHStat{display:flex;flex-direction:column;align-items:flex-end}',
      '.bpHStatVal{font-size:22px;font-weight:700;font-family:"Playfair Display",Georgia,serif;line-height:1;color:#e5e7eb}',
      '.bpHStatLbl{font-size:10px;color:rgba(148,163,184,.55);letter-spacing:.4px;text-transform:uppercase;margin-top:1px}',
      /* dashboard cards */
      '.bpDash{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px}',
      '.bpDCard{border:1px solid rgba(148,163,184,.14);border-radius:12px;padding:12px 14px;background:rgba(15,23,42,.35)}',
      '.bpDCardVal{font-size:24px;font-weight:700;font-family:"Playfair Display",Georgia,serif;color:#e5e7eb;line-height:1}',
      '.bpDCardLbl{font-size:11px;color:rgba(148,163,184,.55);margin-top:4px;letter-spacing:.3px}',
      '.bpDCardSub{font-size:12px;color:rgba(148,163,184,.75);margin-top:2px}',
      /* section titles */
      '.bpSection{font-size:11px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:rgba(148,163,184,.45);margin:16px 0 8px}',
      '.bpSection:first-child{margin-top:0}',
      /* litter cards */
      '.bpLitterCard{border:1px solid rgba(148,163,184,.12);border-radius:12px;overflow:hidden;margin-bottom:10px;background:rgba(15,23,42,.25)}',
      '.bpLitterHead{padding:10px 14px;background:rgba(15,23,42,.45);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .14s}',
      '.bpLitterHead:hover{background:rgba(96,165,250,.06)}',
      '.bpLitterDate{font-size:13px;font-weight:600;font-family:"Playfair Display",Georgia,serif;color:#dce8fa;min-width:90px}',
      '.bpLitterParents{flex:1;display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-width:0}',
      '.bpParentChip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;font-size:11.5px;font-weight:700;cursor:pointer;transition:background .14s;white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis}',
      '.bpParentChip.sire{background:rgba(59,110,210,.15);border:1px solid rgba(71,120,210,.3);color:#93c5fd}',
      '.bpParentChip.sire:hover{background:rgba(59,110,210,.28)}',
      '.bpParentChip.dam{background:rgba(168,65,130,.15);border:1px solid rgba(180,80,140,.3);color:#f9a8d4}',
      '.bpParentChip.dam:hover{background:rgba(168,65,130,.28)}',
      '.bpParentChip.unk{background:rgba(148,163,184,.08);border:1px solid rgba(148,163,184,.2);color:rgba(148,163,184,.55)}',
      '.bpLitterMeta{display:flex;align-items:center;gap:10px;flex-shrink:0}',
      '.bpLitterCount{font-size:12px;font-weight:700;color:rgba(148,163,184,.7)}',
      '.bpLitterCOI{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px}',
      '.bpLitterCOI.coiLow{color:var(--coi-low-fg);background:var(--coi-low-bg);border:1px solid var(--coi-low-border)}',
      '.bpLitterCOI.coiMid{color:var(--coi-mid-fg);background:var(--coi-mid-bg);border:1px solid var(--coi-mid-border)}',
      '.bpLitterCOI.coiHigh{color:var(--coi-high-fg);background:var(--coi-high-bg);border:1px solid var(--coi-high-border)}',

      '.bpLitterBody{display:none;border-top:1px solid rgba(148,163,184,.08)}',
      '.bpPupRow{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid rgba(148,163,184,.06);cursor:pointer;transition:background .12s}',

      '.bpPupRow:hover{background:rgba(96,165,250,.05)}',
      '.bpPupSex{width:18px;height:16px;border-radius:99px;font-size:10px;font-weight:900;color:#fff;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}',
      '.bpPupName{font-size:13px;font-weight:700;font-family:"Playfair Display",Georgia,serif;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}',
      '.bpPupMeta{font-size:11px;color:rgba(148,163,184,.6);white-space:nowrap}',

      '.bpDogRow{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid rgba(148,163,184,.07);cursor:pointer;transition:background .12s;border-radius:6px}',
      '.bpDogRow:last-child{border-bottom:none}',
      '.bpDogRow:hover{background:rgba(96,165,250,.05)}',
      /* generic link */
      '.bpLink{color:#93c5fd;cursor:pointer;font-weight:700;text-decoration:none}',

      /* COI bar */
      '.bpCoiBar{height:3px;border-radius:99px;background:rgba(255,255,255,.05);overflow:hidden;margin-top:5px}',
      '.bpCoiBarFill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--coi-low-fg),rgba(20,184,166,.4))}',
      '.bpCoiBarFill.mid{background:linear-gradient(90deg,var(--coi-mid-fg),rgba(245,158,11,.4))}',
      '.bpCoiBarFill.high{background:linear-gradient(90deg,var(--coi-high-fg),rgba(234,88,12,.4))}',
      /* grid */
      '.bpGrid{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;font-size:12.5px;margin-bottom:10px}',
      '.bpGrid .k{color:rgba(148,163,184,.6);font-size:11.5px}',
      '.bpGrid .v{font-weight:700;color:#e5e7eb}',
    ].join('');
    document.head.appendChild(s);
  }

  /* ── build HTML ── */
  var coiAvgCls=coiAvg==null?'':coiAvg<5?'coiLow':coiAvg<10?'coiMid':'coiHigh';
  var coiAvgStr=coiAvg==null?'--':coiAvg.toFixed(1)+'%';

  var html='<div style="display:flex;flex-direction:column;height:100%;min-height:0">';

  /* header */
  html+='<div class="bpHeader">';
  html+='<div><div class="bpTitle">'+clean(breeder)+'</div><div class="bpSubtitle">Scheda allevatore</div></div>';
  html+='<div class="bpHeaderStats">';
  html+='<div class="bpHStat"><div class="bpHStatVal">'+litters.length+'</div><div class="bpHStatLbl">Cucciolate</div></div>';
  html+='<div class="bpHStat"><div class="bpHStatVal">'+total+'</div><div class="bpHStatLbl">Cani</div></div>';
  html+='<div class="bpHStat"><div class="bpHStatVal '+(coiAvg!=null?coiAvgCls:'')+'" style="font-size:16px">'+coiAvgStr+'</div><div class="bpHStatLbl">COI medio</div></div>';
  html+='</div></div>';

  /* shell: nav + content */
  html+='<div class="bpShell">';

  /* left nav */
  html+='<div class="bpNav">';
  html+='<div class="bpNavItem active" id="bn_overview"><span class="bpNavIcon">🏠</span>Riepilogo</div>';
  html+='<div class="bpNavItem" id="bn_litters"><span class="bpNavIcon">🐾</span>Cucciolate<span class="bpNavBadge">'+litters.length+'</span></div>';
  html+='<div class="bpNavItem" id="bn_dogs"><span class="bpNavIcon">🐕</span>Cani<span class="bpNavBadge">'+total+'</span></div>';
  html+='<div class="bpNavItem" id="bn_gen"><span class="bpNavIcon">🧬</span>Genetica</div>';
  html+='<div class="bpNavItem" id="bn_bottleneck"><span class="bpNavIcon">⚗️</span>Imbuto</div>';
  html+='<div class="bpNavItem" id="bn_stats"><span class="bpNavIcon">📊</span>Statistiche</div>';
  html+='<div style="margin-top:auto;padding:10px 10px 6px;border-top:1px solid rgba(148,163,184,.1)">';
  html+='<div id="bn_printReport" style="display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border-radius:8px;border:1px solid rgba(148,163,184,.2);background:rgba(96,165,250,.08);color:rgba(147,197,253,.9);font-size:11.5px;font-weight:700;transition:background .14s"><span>🖨️</span>Stampa Report</div>';
  html+='</div>';
  html+='</div>';

  /* content panels */
  html+='<div class="bpContent">';

  /* ── OVERVIEW ── */
  html+='<div id="bp_overview">';
  html+='<div class="bpSection">Riepilogo</div>';
  html+='<div class="bpDash">';
  html+='<div class="bpDCard"><div class="bpDCardVal">'+total+'</div><div class="bpDCardLbl">Cani registrati</div><div class="bpDCardSub">M: '+m+' · F: '+f+(u?' · ?: '+u:'')+'</div></div>';
  html+='<div class="bpDCard"><div class="bpDCardVal">'+litters.length+'</div><div class="bpDCardLbl">Cucciolate</div><div class="bpDCardSub">'+years+'</div></div>';
  html+='<div class="bpDCard"><div class="bpDCardVal '+coiAvgCls+'" style="font-size:20px">'+coiAvgStr+'</div><div class="bpDCardLbl">COI medio</div><div class="bpDCardSub">'+(alertTxt||'--')+'</div></div>';
  html+='<div class="bpDCard"><div class="bpDCardVal" style="font-size:16px">'+topCountries.split(' / ')[0]+'</div><div class="bpDCardLbl">Paese principale</div><div class="bpDCardSub">'+topCountries+'</div></div>';
  html+='</div>';
  if(topSires.length){
    html+='<div class="bpSection">Padri più usati</div><div class="bpGrid">';
    for(var i=0;i<Math.min(topSires.length,5);i++){
      var ts=topSires[i];
      html+='<div class="k">'+(i+1)+'.</div><div class="v"><span class="bpLink" data-id="'+escId(ts.id)+'">'+clean(ts.name)+'</span> <span style="opacity:.5;font-size:11px">('+ts.n+' cucc.)</span></div>';
    }

  }
  if(topDams.length){
    html+='<div class="bpSection">Madri più usate</div><div class="bpGrid">';
    for(var i=0;i<Math.min(topDams.length,5);i++){

    }
    html+='</div>';
  }

  /* ── LITTERS ── */
  html+='<div id="bp_litters" style="display:none">';
  html+='<div class="bpSection">Cucciolate ('+litters.length+') — ordinate dalla più recente</div>';
  for(var i=0;i<litters.length;i++){
    var L=litters[i];
    /* compute avg COI of litter */
    var litCoiSum=0,litCoiN=0;
    for(var j=0;j<L.pups.length;j++){
      var Fv=F_of(L.pups[j].id);
      if(Fv!=null&&isFinite(Fv)){ litCoiSum+=Fv*100; litCoiN++; }
    }
    var litCoiAvg=litCoiN?(litCoiSum/litCoiN):null;
    var litCls=litCoiAvg==null?'':litCoiAvg<5?'coiLow':litCoiAvg<10?'coiMid':'coiHigh';
    var sireRec=L.padre?INDEX.get(L.padre):null;
    var damRec=L.madre?INDEX.get(L.madre):null;
    var sireLabel=sireRec?clean(sireRec.name||L.padre):(L.padre?clean(L.padre):'Padre sconosciuto');
    var damLabel=damRec?clean(damRec.name||L.madre):(L.madre?clean(L.madre):'Madre sconosciuta');
    var hasKnownSire=!!(L.padre);
    var hasKnownDam=!!(L.madre);

    html+='<div class="bpLitterCard">';
    html+='<div class="bpLitterHead" id="blh_'+i+'">';
    html+='<div class="bpLitterDate">'+(L.birth?'n. '+clean(L.birth):'data sconosciuta')+'</div>';

    html+='<span class="bpParentChip '+(hasKnownDam?'dam':'unk')+'" '+(hasKnownDam&&damRec?'data-id="'+escId(L.madre)+'"':'')+'>';
    html+='<span style="font-size:10px">♀</span>'+ellipsize(damLabel,18)+'</span>';

  html+='</div>';

  /* ── GENETICA ── */

      if(el&&el.getAttribute('data-id')){
        e.stopPropagation();
        var rid=el.getAttribute('data-id');
        var rec=INDEX.get(rid);
        if(rec) openProfile(rec);
        return;
      }
      /* pup/dog row */
      var row=e.target.closest?e.target.closest('.bpPupRow,.bpDogRow'):null;
      if(row&&row.getAttribute('data-id')){

        if(rec2) openProfile(rec2);

    });

    /* ── bottleneck render ── */
    function renderBottleneck(){
      var box=document.getElementById('bnk_body');
      if(!box||box.innerHTML) return;
      var out='';
      var uniqueSires=sireUse.size, uniqueDams=damUse.size;
      var totalSireLitters=0; sireUse.forEach(function(n){ totalSireLitters+=n; });
      var totalDamLitters=0; damUse.forEach(function(n){ totalDamLitters+=n; });
      function herfindahl(useMap,total){ var sum=0; useMap.forEach(function(n){ var p=n/total; sum+=p*p; }); return sum; }
      var HI_sire=uniqueSires>0?herfindahl(sireUse,totalSireLitters):null;
      var HI_dam=uniqueDams>0?herfindahl(damUse,totalDamLitters):null;
      var Ne_sire=HI_sire?Math.round(10/HI_sire)/10:null;
      var Ne_dam=HI_dam?Math.round(10/HI_dam)/10:null;
      var siresSorted=Array.from(sireUse.entries()).sort(function(a,b){return b[1]-a[1];});
      var damsSorted=Array.from(damUse.entries()).sort(function(a,b){return b[1]-a[1];});
      function top3pct(sorted,total){ var n3=sorted.slice(0,3).reduce(function(acc,it){return acc+it[1];},0); return total>0?(n3/total*100):0; }
      var top3sire=top3pct(siresSorted,totalSireLitters);
      var top3dam=top3pct(damsSorted,totalDamLitters);
      function bottleneckRisk(Hi,ne,top3){
        if(Hi===null) return {label:'N/D',cls:'',desc:'Dati insufficienti.'};
        if(ne<2.5||top3>70) return {label:'ALTO',cls:'coiHigh',desc:'Forte concentrazione genetica. Pochi riproduttori dominano le nascite.'};
        if(ne<5||top3>50) return {label:'MODERATO',cls:'coiMid',desc:'Concentrazione significativa. Valutare diversificazione dei riproduttori.'};
        return {label:'BASSO',cls:'coiLow',desc:'Buona distribuzione genetica tra i riproduttori.'};
      }
      var riskSire=bottleneckRisk(HI_sire,Ne_sire,top3sire);
      var riskDam=bottleneckRisk(HI_dam,Ne_dam,top3dam);

      out+='<div class="bpSection">Riproduttori maschi</div>';
      out+='<div class="bpGrid">'+
        '<div class="k">Padri unici usati</div><div class="v">'+uniqueSires+'</div>'+
        '<div class="k">Ne effettivo</div><div class="v">'+(Ne_sire!=null?Ne_sire.toFixed(1):'--')+'</div>'+
        '<div class="k">Copertura top 3</div><div class="v">'+top3sire.toFixed(1)+'% delle cucciolate</div>'+
        '<div class="k">Indice conc.</div><div class="v">'+(HI_sire!=null?HI_sire.toFixed(3):'--')+' (0=uniforme, 1=monopolio)</div>'+
        '<div class="k">Rischio imbuto</div><div class="v"><span class="bStat '+riskSire.cls+'" style="padding:2px 8px;font-size:12px">'+riskSire.label+'</span></div>'+
        '</div>';
      out+='<div style="font-size:12px;color:rgba(148,163,184,.7);margin-bottom:12px">'+riskSire.desc+'</div>';
      out+='<div class="bpSection">Utilizzo padri</div>';
      for(var i=0;i<Math.min(siresSorted.length,8);i++){
        var sid=siresSorted[i][0],sn=siresSorted[i][1];
        var srec=INDEX.get(sid)||{};
        var pct=totalSireLitters>0?(sn/totalSireLitters*100):0;
        out+='<div class="pItem" style="cursor:pointer" data-id="'+escId(sid)+'">';
        out+='<div class="pItemTop"><div class="pItemName linkish">'+clean(srec.name||sid)+'</div><div class="pRight">'+sn+' cucc. ('+pct.toFixed(1)+'%)</div></div>';
        out+='<div class="pBar"><div class="pBarFill" style="width:'+Math.max(2,Math.min(100,pct)).toFixed(1)+'%;background:rgba(71,120,210,.7)"></div></div>';
        out+='</div>';
      }
      out+='<div class="bpSection" style="margin-top:16px">Riproduttori femmine</div>';
      out+='<div class="bpGrid">'+
        '<div class="k">Madri uniche usate</div><div class="v">'+uniqueDams+'</div>'+
        '<div class="k">Ne effettivo</div><div class="v">'+(Ne_dam!=null?Ne_dam.toFixed(1):'--')+'</div>'+
        '<div class="k">Copertura top 3</div><div class="v">'+top3dam.toFixed(1)+'% delle cucciolate</div>'+
        '<div class="k">Indice conc.</div><div class="v">'+(HI_dam!=null?HI_dam.toFixed(3):'--')+'</div>'+
        '<div class="k">Rischio imbuto</div><div class="v"><span class="bStat '+riskDam.cls+'" style="padding:2px 8px;font-size:12px">'+riskDam.label+'</span></div>'+
        '</div>';
      out+='<div style="font-size:12px;color:rgba(148,163,184,.7);margin-bottom:12px">'+riskDam.desc+'</div>';
      out+='<div class="bpSection">Utilizzo madri</div>';
      for(var i=0;i<Math.min(damsSorted.length,8);i++){
        var did=damsSorted[i][0],dn=damsSorted[i][1];
        var drec=INDEX.get(did)||{};
        var dpct=totalDamLitters>0?(dn/totalDamLitters*100):0;
        out+='<div class="pItem" style="cursor:pointer" data-id="'+escId(did)+'">';
        out+='<div class="pItemTop"><div class="pItemName linkish">'+clean(drec.name||did)+'</div><div class="pRight">'+dn+' cucc. ('+dpct.toFixed(1)+'%)</div></div>';
        out+='<div class="pBar"><div class="pBarFill" style="width:'+Math.max(2,Math.min(100,dpct)).toFixed(1)+'%;background:rgba(168,65,130,.7)"></div></div>';
        out+='</div>';
      }
      out+='<div style="margin-top:14px;font-size:12px;color:rgba(148,163,184,.55);line-height:1.7">';
      out+='<b>Ne effettivo</b>: numero equivalente di riproduttori se fossero usati equamente.<br>';
      out+='<b>Indice di concentrazione</b>: 0 = distribuzione perfetta, 1 = un solo riproduttore.<br>';
      out+='<b>Copertura top 3</b>: % di cucciolate attribuibili ai 3 padri/madri più usati.';
      out+='</div>';
      box.innerHTML=out;
      /* wire clicks on pItems */
      box.querySelectorAll('.pItem[data-id]').forEach(function(el){
        el.onclick=function(e){ e.stopPropagation(); var r=INDEX.get(el.getAttribute('data-id')); if(r) openProfile(r); };
      });
    }

    /* ── stats render ── */
    function renderStats(){
      var box=document.getElementById('bsb');
      if(!box||box.innerHTML) return;
      var out='';
      function topSection(list){
        if(!list||!list.length) return '<div style="font-size:12px;opacity:.5">Nessun dato.</div>';
        var s='<div class="bpGrid">';
        for(var i=0;i<list.length;i++){
          var it=list[i];
          s+='<div class="k">'+(i+1)+'.</div><div class="v"><span class="bpLink" data-id="'+escId(it.id)+'">'+clean(it.name)+'</span> <span style="opacity:.5;font-size:11px">('+it.n+' cucc.)</span></div>';
        }
        return s+'</div>';
      }
      out+='<div class="bpSection">Top 5 Padri</div>'+topSection(topSires);
      out+='<div class="bpSection">Top 5 Madri</div>'+topSection(topDams);
      var coiByYear=new Map();
      for(var i=0;i<rows.length;i++){
        var r=rows[i]; if(!r.birth) continue;
        var yr=String(r.birth).slice(0,4); if(!yr) continue;
        var Fv=F_of(r.id); if(Fv==null||!isFinite(Fv)||isNaN(Fv)) continue;
        if(!coiByYear.has(yr)) coiByYear.set(yr,{sum:0,n:0});
        var o=coiByYear.get(yr); o.sum+=Fv*100; o.n++;
      }
      var coiYears=Array.from(coiByYear.entries()).map(function(it){ return {year:it[0],avg:it[1].n?it[1].sum/it[1].n:null,n:it[1].n}; }).sort(function(a,b){ return a.year.localeCompare(b.year); });
      out+='<div class="bpSection">COI nel tempo</div>';
      if(coiYears.length){
        out+='<div class="bpGrid">';
        for(var i=0;i<coiYears.length;i++){
          var yr=coiYears[i];
          var yrCls=yr.avg==null?'':yr.avg<5?'coiLow':yr.avg<10?'coiMid':'coiHigh';
          out+='<div class="k">'+yr.year+'</div><div class="v '+yrCls+'">'+(yr.avg==null?'--':yr.avg.toFixed(2)+'%')+' <span style="opacity:.5;font-size:11px">('+yr.n+' sogg.)</span></div>';
        }
        out+='</div>';
      } else out+='<div style="font-size:12px;opacity:.5">Nessun dato.</div>';
      box.innerHTML=out;
      box.querySelectorAll('.bpLink[data-id]').forEach(function(el){
        el.onclick=function(e){ e.stopPropagation(); var r=INDEX.get(el.getAttribute('data-id')); if(r) openProfile(r); };
      });
    }

    setTab('overview');
  });
}
